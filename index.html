<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philia - Conferma Prenotazione</title>
    <style>
        body { background-color: #0d0d0d; color: #d4af37; font-family: 'Helvetica Neue', sans-serif; text-align: center; padding: 60px 20px; margin: 0; }
        .logo { max-width: 180px; margin-bottom: 30px; }
        h1 { font-weight: 300; letter-spacing: 2px; text-transform: uppercase; font-size: 1.2em; }
        .loader { border: 2px solid #333; border-top: 2px solid #d4af37; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { display: none; padding: 15px 30px; background: #d4af37; color: #000; text-decoration: none; border-radius: 2px; font-weight: bold; margin: 10px auto; text-transform: uppercase; letter-spacing: 1px; width: 220px; }
        #qr-msg { display: none; margin-top: 30px; color: #888; font-size: 0.9em; line-height: 1.5; }
    </style>
</head>
<body>
    <img src="logo.png" alt="Philia Logo" class="logo">
    
    <div id="loader" class="loader"></div>
    <p id="status">Ti stiamo portando nell'App...</p>
    
    <a href="https://apps.apple.com/it/app/philiaapp/id6760352252" id="btn-ios" class="btn">Apri App Store</a>
    <a href="https://play.google.com/store/apps/details?id=com.philiaa.philiaapp&hl=it" id="btn-android" class="btn">Apri Play Store</a>
    
    <div id="qr-msg">Prenotazione confermata!<br>Se sei su PC, inquadra questo link con lo smartphone per salvare l'appuntamento nell'app.</div>

    <script>
        const params = window.location.search;
        const appLink = "philia://conferma" + params;
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        if (isMobile) {
            window.location.href = appLink;
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('status').innerHTML = "Per gestire la prenotazione e ricevere i promemoria, apri o scarica l'app:";
                document.getElementById('btn-ios').style.display = 'block';
                document.getElementById('btn-android').style.display = 'block';
            }, 3000);
        } else {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('status').style.display = 'none';
            document.getElementById('qr-msg').style.display = 'block';
        }
    </script>
</body>
</html>
