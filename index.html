<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philia - Conferma Prenotazione</title>
    <style>
        body { background-color: #0d0d0d; color: #d4af37; font-family: 'Helvetica Neue', sans-serif; text-align: center; padding: 100px 20px; margin: 0; }
        h1 { font-weight: 300; letter-spacing: 2px; text-transform: uppercase; }
        .loader { border: 2px solid #333; border-top: 2px solid #d4af37; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { display: none; padding: 15px 30px; background: #d4af37; color: #000; text-decoration: none; border-radius: 2px; font-weight: bold; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }
        #qr-msg { display: none; margin-top: 30px; color: #888; }
    </style>
</head>
<body>
    <h1>Philia</h1>
    <div id="loader" class="loader"></div>
    <p id="status">Ti stiamo portando nell'App...</p>
    
    <a href="https://apps.apple.com/app/philia-barber" id="btn-ios" class="btn">Scarica per iPhone</a>
    <a href="https://play.google.com/store/apps/details?id=com.philia" id="btn-android" class="btn">Scarica per Android</a>
    
    <div id="qr-msg">Sei su PC? Inquadra questo link con il telefono per salvare l'appuntamento nell'app.</div>

    <script>
        const params = window.location.search;
        const appLink = "philia://conferma" + params;
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        if (isMobile) {
            // Tenta l'apertura immediata
            window.location.href = appLink;
            
            // Se dopo 3 secondi è ancora qui, mostra i tasti download
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('status').innerHTML = "La tua prenotazione è confermata!<br>Per ricevere i promemoria, apri o scarica l'app:";
                document.getElementById('btn-ios').style.display = 'inline-block';
                document.getElementById('btn-android').style.display = 'inline-block';
            }, 3000);
        } else {
            // Se è su PC
            document.getElementById('loader').style.display = 'none';
            document.getElementById('status').innerHTML = "Prenotazione confermata!";
            document.getElementById('qr-msg').style.display = 'block';
        }
    </script>
</body>
</html>
