<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philia - Conferma Prenotazione</title>
    <style>
        /* COLORE DI SFONDO COORDINATO AL LOGO */
        body { 
            background-color: #332d2d; 
            color: #d4af37; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            text-align: center; 
            padding: 60px 20px; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            justify-content: center; 
        }

        .logo { 
            max-width: 250px; /* Leggermente più grande visto il formato */
            height: auto; 
            margin-bottom: 30px; 
        }

        h1 { font-weight: 300; letter-spacing: 3px; text-transform: uppercase; font-size: 1.1em; margin-bottom: 10px; }
        
        .loader { border: 2px solid #444; border-top: 2px solid #d4af37; border-radius: 50%; width: 25px; height: 25px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #status { font-size: 0.9em; letter-spacing: 1px; color: #e0e0e0; margin-bottom: 20px; text-transform: uppercase; }
        
        .btn { 
            display: none; 
            padding: 16px 32px; 
            background: #d4af37; 
            color: #332d2d; /* Testo del tasto dello stesso colore dello sfondo per contrasto */
            text-decoration: none; 
            border-radius: 4px; 
            font-weight: bold; 
            margin: 12px 0; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            width: 240px; 
            font-size: 0.85em; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #qr-msg { display: none; margin-top: 20px; color: #d4af37; font-size: 0.85em; line-height: 1.6; max-width: 350px; border-top: 1px solid #444; padding-top: 20px; }
    </style>
</head>
<body>

    <img src="logo.png" alt="Philia Logo" class="logo" onerror="this.style.display='none'">
    
    <div id="loader" class="loader"></div>
    <p id="status">Verifica della prenotazione...</p>
    
    <a href="https://apps.apple.com/it/app/philiaapp/id6760352252" id="btn-ios" class="btn">Apri App Store</a>
    
    <a href="https://play.google.com/store/apps/details?id=com.philiaa.philiaapp&hl=it" id="btn-android" class="btn">Apri Play Store</a>
    
    <div id="qr-msg">
        <strong>PRENOTAZIONE CONFERMATA!</strong><br><br>
        Se sei su PC, inquadra questa pagina con il tuo smartphone per salvare l'appuntamento nell'App Philia.
    </div>

    <script>
        const params = window.location.search;
        const appLink = "philia://conferma" + params;
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        if (isMobile) {
            window.location.href = appLink;
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('status').innerHTML = "PRENOTAZIONE CONFERMATA!<br>Scarica l'app per ricevere i promemoria:";
                document.getElementById('btn-ios').style.display = 'block';
                document.getElementById('btn-android').style.display = 'block';
            }, 3000);
        } else {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('status').style.display = 'none';
            document.getElementById('qr-msg').style.display = 'block';
        }
    </script>
</body>
</html>
