<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philia - Men Hair Concept</title>
    <!-- Librerie React e Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #1a1a1a; margin: 0; color: white; }
        .philia-bg { background-color: #332d2d; }
        .philia-gold { color: #d4af37; }
        .philia-btn { background-color: #d4af37; color: #332d2d; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @media (min-width: 768px) {
            .app-container { max-width: 1200px; margin: 2rem auto; border-radius: 24px; border: 1px solid rgba(212, 175, 55, 0.2); min-height: 85vh; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- ICONE SVG INTERNE ---
        const IconCalendar = () => <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>;
        const IconClock = () => <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 8v4l3 2m6-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>;
        const IconUser = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>;

        // --- CONFIGURAZIONE FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCvNKLOIqAz9ygOJ1Cpl4V94xm3VeKhqow",
            authDomain: "philia-men-hair-concept.firebaseapp.com",
            projectId: "philia-men-hair-concept",
            storageBucket: "philia-men-hair-concept.firebasestorage.app",
            messagingSenderId: "470631594940",
            appId: "1:470631594940:web:a259b8ce4a08fc2a0d49b9",
            measurementId: "G-X5V5J1JJC1"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = "philia-v2-production";

        const INITIAL_SERVICES = [
            { id: 'perm_ricci', name: 'Permanente Ricci', price: 30, duration: 60, desc: 'Per un look dinamico e capelli ricci definiti.' },
            { id: 'comp_scrub', name: 'Completo + Scrub Viso', price: 30, duration: 45, desc: 'Il pacchetto relax completo per pelle e capelli.' },
            { id: 'stira_bras', name: 'Stiratura Brasiliana', price: 30, duration: 60, desc: 'Liscio perfetto e duraturo con trattamento professionale.' },
            { id: 'comp_tinta', name: 'Completo + Tinta', price: 27, duration: 45, desc: 'Servizio completo di taglio, barba e colorazione.' },
            { id: 'schia_cap', name: 'Schiaritura Capelli', price: 20, duration: 60, desc: 'Effetto luce naturale per i tuoi capelli.' },
            { id: 'stira_chim', name: 'Stiratura Chimica', price: 20, duration: 60, desc: 'Controllo totale dei capelli ribelli.' },
            { id: 'tratt_ker', name: 'Trattamento Keratina', price: 20, duration: 30, desc: 'Ricostruzione profonda per capelli sani e forti.' },
            { id: 'tratt_crespo', name: 'Trattamento Disciplinare Crespo', price: 20, duration: 30, desc: 'Elimina il crespo e dona morbidezza.' },
            { id: 'completo', name: 'Completo', price: 20, duration: 30, desc: 'Il classico: Taglio, Barba e Shampoo.' },
            { id: 'taglio_shamp', name: 'Taglio + Shampoo', price: 15, duration: 30, desc: 'Taglio professionale con lavaggio relax.' },
            { id: 'taglio_barba', name: 'Taglio + Barba', price: 15, duration: 45, desc: 'Sincronizza il tuo look: capelli e barba curati.' },
            { id: 'ras_scrub', name: 'Rasatura Barba + Scrub Viso', price: 15, duration: 30, desc: 'Pelle rigenerata e barba perfetta.' },
            { id: 'taglio_bimbo_sh', name: 'Taglio Bimbo + Shampoo', price: 13, duration: 30, desc: 'Servizio dedicato ai più piccoli con lavaggio.' },
            { id: 'ras_tinta_barba', name: 'Rasatura + Tinta Barba', price: 12, duration: 15, desc: 'Definizione e colore per una barba impeccabile.' },
            { id: 'taglio_uomo', name: 'Taglio Uomo', price: 10, duration: 30, desc: 'Taglio classico o moderno eseguito a regola d\'arte.' },
            { id: 'barba_shamp', name: 'Barba + Shampoo', price: 10, duration: 30, desc: 'Cura specifica per la barba con detersione.' },
            { id: 'taglio_bambino', name: 'Taglio Bambino', price: 8, duration: 30, desc: 'Taglio veloce e divertente per bambini.' },
            { id: 'barba_panno', name: 'Barba Panno Caldo', price: 8, duration: 30, desc: 'Il rituale tradizionale Philia con panno caldo.' },
            { id: 'shampoo', name: 'Shampoo', price: 5, duration: 15, desc: 'Lavaggio purificante con massaggio cutaneo.' },
            { id: 'rasatura_barba', name: 'Rasatura Barba', price: 5, duration: 15, desc: 'Rifinitura rapida e precisa della tua barba.' }
        ];

        function App() {
            // --- STATI PRINCIPALI ---
            const [clientPhone, setClientPhone] = useState(localStorage.getItem('philia_phone') || "");
            const [clientName, setClientName] = useState(localStorage.getItem('philia_name') || "");
            const [isIdentified, setIsIdentified] = useState(!!localStorage.getItem('philia_phone'));
            const [view, setView] = useState('booking'); 
            const [adminUser, setAdminUser] = useState(null);
            const [adminSubView, setAdminSubView] = useState('agenda'); 
            const [adminAgendaDate, setAdminAgendaDate] = useState(new Date().toLocaleDateString('sv-SE'));
            const [step, setStep] = useState(1);
            
            const isPopState = useRef(false);

            const [barbers, setBarbers] = useState([]);
            const [services, setServices] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [settings, setSettings] = useState(null);
            const [loading, setLoading] = useState(true);
            const [staffPassword, setStaffPassword] = useState("philia2024");
            const [tempStaffPwd, setTempStaffPwd] = useState("");
            const [calendarViewDate, setCalendarViewDate] = useState(new Date());
            const [selectedBarber, setSelectedBarber] = useState(null);
            const [selectedService, setSelectedService] = useState(null);
            const [selectedDate, setSelectedDate] = useState(new Date().toLocaleDateString('sv-SE'));
            const [selectedSlot, setSelectedSlot] = useState(null);

            const simoneBarber = useMemo(() => barbers.find(b => b.name.trim().toUpperCase() === 'SIMONE'), [barbers]);
            const currentCollaborator = useMemo(() => {
                if (!adminUser) return null;
                return barbers.find(b => b.name.trim().toUpperCase() === adminUser.trim().toUpperCase());
            }, [barbers, adminUser]);

            // --- GESTIONE CRONOLOGIA BROWSER (TASTO INDIETRO FISICO / GESTURE) ---
            useEffect(() => {
                const handlePopState = (event) => {
                    if (event.state) {
                        isPopState.current = true;
                        setView(event.state.view || 'booking');
                        setStep(event.state.step || 1);
                        setAdminSubView(event.state.adminSubView || 'agenda');
                        setAdminUser(event.state.adminUser || null);
                    }
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            useEffect(() => {
                if (!isPopState.current) {
                    window.history.pushState({ view, step, adminSubView, adminUser }, "");
                }
                isPopState.current = false;
            }, [view, step, adminSubView, adminUser]);

            useEffect(() => {
                auth.onAuthStateChanged(async (u) => {
                    if (!u) await auth.signInAnonymously();
                    setLoading(false);
                });
                const basePath = db.collection('artifacts').doc(appId).collection('public').doc('data');
                basePath.collection('config').doc('schedule').onSnapshot(doc => { if (doc.exists) setSettings(doc.data()); });
                basePath.collection('config').doc('auth').onSnapshot(doc => {
                    if (doc.exists && doc.data().password) {
                        setStaffPassword(doc.data().password);
                        setTempStaffPwd(doc.data().password);
                    }
                });
                basePath.collection('services').onSnapshot(snap => {
                    let data = snap.docs.map(d => ({ firestoreId: d.id, ...d.data() }));
                    if (data.length === 0) { INITIAL_SERVICES.forEach(s => basePath.collection('services').add(s)); }
                    setServices(data.sort((a,b) => b.price - a.price));
                });
                basePath.collection('barbers').onSnapshot(snap => {
                    setBarbers(snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order || 0) - (b.order || 0)));
                });
                basePath.collection('bookings').onSnapshot(snap => {
                    setBookings(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });
            }, []);

            const saveIdentity = () => {
                const trimmedPhone = clientPhone.toString().trim().replace(/\s+/g, '');
                const trimmedName = clientName.trim();
                if (trimmedPhone.length < 9 || trimmedName.length < 2) return alert("Inserisci Nome e Cellulare validi.");
                localStorage.setItem('philia_phone', trimmedPhone);
                localStorage.setItem('philia_name', trimmedName);
                setClientPhone(trimmedPhone);
                setClientName(trimmedName);
                setIsIdentified(true);
            };

            const logout = () => {
                if(confirm("Vuoi cambiare utente o disconnetterti?")) {
                    localStorage.removeItem('philia_phone');
                    localStorage.removeItem('philia_name');
                    window.location.reload();
                }
            };

            const handleConfirm = async () => {
                const trimmedPhone = clientPhone.toString().trim().replace(/\s+/g, '');
                const booking = {
                    customerName: clientName.trim(), 
                    customerPhone: trimmedPhone,
                    barberId: selectedBarber.id, barberName: selectedBarber.name,
                    serviceId: selectedService.firestoreId || selectedService.id, serviceName: selectedService.name,
                    date: selectedDate, time: selectedSlot,
                    duration: selectedService.duration || 30,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                };
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('bookings').add(booking);
                alert("Appuntamento fissato! ✂️");
                setView('my-bookings');
                setStep(1);
            };

            const timeToMinutes = (timeStr) => {
                const [h, m] = timeStr.split(':').map(Number);
                return h * 60 + m;
            };

            const getFreeSlots = () => {
                if (!settings || !selectedBarber || !selectedService) return [];
                const d = new Date(selectedDate);
                const day = d.getDay();
                const serviceDuration = selectedService.duration || 30;
                let hours = null;
                if (selectedBarber.dateOverrides?.[selectedDate]) hours = selectedBarber.dateOverrides[selectedDate];
                else if (settings.dateOverrides?.[selectedDate]) hours = settings.dateOverrides[selectedDate];
                else if (selectedBarber.personalSchedule?.[day]) hours = selectedBarber.personalSchedule[day];
                else hours = settings.openingHours[day];

                if (!hours || !hours.open) return [];
                const now = new Date();
                const todayStr = new Date().toLocaleDateString('sv-SE');
                const currentTotalMinutes = now.getHours() * 60 + now.getMinutes();
                let slots = [];
                const occupied = bookings.filter(b => b.date === selectedDate && b.barberId === selectedBarber.id);

                const gen = (start, end) => {
                    if (!start || !end) return;
                    let curMin = timeToMinutes(start);
                    const endMin = timeToMinutes(end);
                    while (curMin + serviceDuration <= endMin) {
                        const h = Math.floor(curMin / 60).toString().padStart(2, '0');
                        const m = (curMin % 60).toString().padStart(2, '0');
                        const timeStr = `${h}:${m}`;
                        const isPast = (selectedDate === todayStr && curMin <= currentTotalMinutes);
                        const isBooked = occupied.some(b => {
                            const bStart = timeToMinutes(b.time);
                            const bEnd = bStart + (b.duration || 30);
                            const sEnd = curMin + serviceDuration;
                            return (curMin < bEnd && sEnd > bStart);
                        });
                        if (!isPast && !isBooked) slots.push(timeStr);
                        curMin += serviceDuration;
                    }
                };
                if (hours.am && (hours.amActive !== false)) gen(hours.am[0], hours.am[1]);
                if (hours.pm && (hours.pmActive !== false)) gen(hours.pm[0], hours.pm[1]);
                return slots;
            };

            const calendarDays = useMemo(() => {
                const year = calendarViewDate.getFullYear();
                const month = calendarViewDate.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const days = [];
                const startOffset = firstDay === 0 ? 6 : firstDay - 1;
                for (let i = 0; i < startOffset; i++) days.push(null);
                for (let d = 1; d <= daysInMonth; d++) days.push(new Date(year, month, d));
                return days;
            }, [calendarViewDate]);

            const changeMonth = (offset) => {
                const newDate = new Date(calendarViewDate);
                newDate.setMonth(newDate.getMonth() + offset);
                setCalendarViewDate(newDate);
            };

            const updateStaffPassword = async () => {
                if (tempStaffPwd.length < 4) return alert("Minimo 4 caratteri.");
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('auth').set({ password: tempStaffPwd });
                alert("Password aggiornata!");
            };

            // --- COMPONENTI UI ---
            const AgendaDateNavAdmin = () => (
                <div className="flex flex-col md:flex-row justify-between items-center bg-[#332d2d] p-6 rounded-[35px] border border-[#d4af37]/20 shadow-2xl gap-6 mb-6">
                    <div className="flex items-center gap-6">
                        <button onClick={() => changeAgendaDate(-1)} className="w-12 h-12 flex items-center justify-center bg-black/20 hover:bg-[#d4af37] rounded-full border border-[#d4af37]/20 font-black text-xl text-white">←</button>
                        <div className="text-center text-white">
                            <input type="date" value={adminAgendaDate} onChange={(e) => setAdminAgendaDate(e.target.value)} className="bg-transparent text-[#d4af37] font-black text-2xl outline-none text-center cursor-pointer" />
                            <p className="text-[10px] uppercase philia-gold font-bold tracking-[3px] mt-1">{new Date(adminAgendaDate + 'T00:00:00').toLocaleDateString('it-IT', { weekday: 'long' })}</p>
                        </div>
                        <button onClick={() => changeAgendaDate(1)} className="w-12 h-12 flex items-center justify-center bg-black/20 hover:bg-[#d4af37] rounded-full border border-[#d4af37]/20 font-black text-xl text-white">→</button>
                    </div>
                    <button onClick={() => setAdminAgendaDate(new Date().toLocaleDateString('sv-SE'))} className="px-8 py-3 bg-[#d4af37] text-[#332d2d] rounded-2xl font-black uppercase text-xs tracking-widest hover:scale-105 transition-all shadow-lg text-white">Oggi</button>
                </div>
            );

            const ExceptionForm = ({ targetId, isMasterMode = false }) => (
                <div className="philia-bg p-6 rounded-3xl border border-white/5 space-y-5">
                    <div className="space-y-1 text-left">
                        <label className="text-[10px] uppercase opacity-50 ml-2 font-black tracking-widest text-white">Scegli Data</label>
                        <input type="date" value={newExc.date} onChange={(e)=>setNewExc({...newExc, date: e.target.value})} className="w-full bg-black/40 border border-white/10 p-4 rounded-xl font-bold text-white outline-none" />
                    </div>
                    <button onClick={()=>setNewExc({...newExc, open: !newExc.open})} className={`w-full p-4 rounded-xl font-black text-xs uppercase ${newExc.open ? 'bg-green-600' : 'bg-red-500/20 text-red-500'}`}>{newExc.open ? 'Giorno Aperto (Imposta Orari)' : 'Giorno Chiuso (Ferie)'}</button>
                    {newExc.open && (
                        <div className="space-y-6 pt-4 border-t border-white/5">
                            <div className="space-y-3">
                                <div className="flex justify-between items-center px-2 text-white">
                                    <span className="text-[10px] font-black uppercase philia-gold">Mattina (AM)</span>
                                    <button onClick={()=>setNewExc({...newExc, amActive: !newExc.amActive})} className={`px-4 py-1.5 rounded-full text-[9px] font-black uppercase ${newExc.amActive ? 'bg-[#d4af37] text-[#332d2d]' : 'bg-white/5 text-white/20'}`}>{newExc.amActive ? 'ATTIVA' : 'OFF'}</button>
                                </div>
                                <div className={`grid grid-cols-2 gap-3 ${newExc.amActive ? 'opacity-100' : 'opacity-20 pointer-events-none'}`}>
                                    <input type="time" value={newExc.am[0]} onChange={(e)=>setNewExc({...newExc, am:[e.target.value, newExc.am[1]]})} className="bg-black/40 p-3 rounded-lg text-xs w-full text-white outline-none" />
                                    <input type="time" value={newExc.am[1]} onChange={(e)=>setNewExc({...newExc, am:[newExc.am[0], e.target.value]})} className="bg-black/40 p-3 rounded-lg text-xs w-full text-white outline-none" />
                                </div>
                            </div>
                            <div className="space-y-3">
                                <div className="flex justify-between items-center px-2 text-white">
                                    <span className="text-[10px] font-black uppercase philia-gold">Pomeriggio (PM)</span>
                                    <button onClick={()=>setNewExc({...newExc, pmActive: !newExc.pmActive})} className={`px-4 py-1.5 rounded-full text-[9px] font-black uppercase ${newExc.pmActive ? 'bg-[#d4af37] text-[#332d2d]' : 'bg-white/5 text-white/20'}`}>{newExc.pmActive ? 'ATTIVA' : 'OFF'}</button>
                                </div>
                                <div className={`grid grid-cols-2 gap-3 ${newExc.pmActive ? 'opacity-100' : 'opacity-20 pointer-events-none'}`}>
                                    <input type="time" value={newExc.pm[0]} onChange={(e)=>setNewExc({...newExc, pm:[e.target.value, newExc.pm[1]]})} className="bg-black/40 p-3 rounded-lg text-xs w-full text-white outline-none" />
                                    <input type="time" value={newExc.pm[1]} onChange={(e)=>setNewExc({...newExc, pm:[newExc.pm[0], e.target.value]})} className="bg-black/40 p-3 rounded-lg text-xs w-full text-white outline-none" />
                                </div>
                            </div>
                        </div>
                    )}
                    {isMasterMode ? (
                        <div className="grid grid-cols-2 gap-3 mt-4">
                            <button onClick={()=>addDateOverride(null, true)} className="philia-btn p-4 rounded-xl font-black uppercase text-[10px] shadow-lg text-[#332d2d]">Tutto Salone</button>
                            <button onClick={()=>addDateOverride(targetId, false)} className="bg-white/10 p-4 rounded-xl font-black uppercase text-[10px] text-white">Solo Simone</button>
                        </div>
                    ) : (
                        <button onClick={()=>addDateOverride(targetId, false)} className="w-full philia-btn p-4 rounded-xl font-black uppercase text-xs shadow-lg mt-4 text-[#332d2d]">Salva Eccezione</button>
                    )}
                </div>
            );

            const AppointmentCard = ({ b }) => (
                <div className="bg-[#1a1a1a] p-5 rounded-[25px] border-l-8 border-[#d4af37] relative group hover:bg-[#252525] transition-all shadow-lg text-left mb-4">
                    <div className="flex justify-between items-start mb-2">
                        <div className="flex items-center gap-2 text-white">
                            <div className="w-2 h-2 bg-[#d4af37] rounded-full shadow-[0_0_8px_#d4af37]"></div>
                            <p className="philia-gold font-black text-xl italic leading-none">{b.time}</p>
                        </div>
                        <button onClick={async () => { if(confirm("Eliminare?")) await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('bookings').doc(b.id).delete(); }} className="w-8 h-8 flex items-center justify-center bg-red-500/10 text-red-500/30 group-hover:text-red-500 rounded-full text-xs text-white">✕</button>
                    </div>
                    <p className="font-black uppercase text-base leading-tight mb-1 text-white">{b.customerName}</p>
                    <p className="text-[10px] opacity-40 uppercase font-bold line-clamp-1 italic mb-3 text-white">{b.serviceName}</p>
                    <div className="flex items-center justify-between mt-auto pt-3 border-t border-white/5">
                        <div className="flex items-center gap-3">
                            <a href={`tel:${b.customerPhone}`} className="text-green-500 text-[11px] font-black tracking-widest flex items-center gap-1 hover:scale-105 transition-transform italic">
                                <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M2 3a1 1 0 011-1h2.153a1 1 0 01.986.836l.74 4.435a1 1 0 01-.54 1.06l-1.548.773a11.037 11.037 0 005.454 5.455l.774-1.548a1 1 0 011.06-.539l4.435.74a1 1 0 01.836.986V17a1 1 0 01-1 1h-2C7.82 18 2 12.18 2 5V3z"></path></svg>
                                CHIAMA
                            </a>
                            <a href={`https://wa.me/${b.customerPhone.toString().replace(/\D/g, '')}`} target="_blank" className="text-emerald-400 text-[11px] font-black tracking-widest flex items-center gap-1 hover:scale-105 transition-transform italic">

                                                            <input type="text" value={tempStaffPwd} onChange={(e)=>setTempStaffPwd(e.target.value)} className="w-full bg-black/40 border border-white/10 p-4 rounded-xl font-bold text-white outline-none" />
                                                        </div>
                                                        <button onClick={updateStaffPassword} className="w-full philia-btn p-5 rounded-2xl font-black uppercase text-xs shadow-xl text-[#332d2d] transition-all hover:scale-105 active:scale-95 text-white text-white">Salva Password</button>
                                                    </div>
                                                </section>

                                                <section className="max-w-5xl mx-auto space-y-6 text-left text-white text-white">
                                                    <div className="flex justify-between items-center border-l-4 border-[#d4af37] pl-4 text-white text-white">
                                                        <h3 className="philia-gold font-black uppercase italic text-xl leading-none">Organico e Competenze</h3>
                                                        <button onClick={addNewBarber} className="philia-btn px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg hover:scale-105 text-white text-white">Aggiungi +</button>
                                                    </div>
                                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 text-white text-white">
                                                        {barbers.map(barber => (
                                                            <div key={barber.id} className="philia-bg p-6 rounded-[35px] border border-white/5 relative text-white">
                                                                {barber.name.trim().toUpperCase() !== 'SIMONE' && <button onClick={()=>removeBarber(barber.id, barber.name)} className="absolute top-5 right-5 text-red-500/20 hover:text-red-500 transition-colors text-white text-white">✕</button>}
                                                                <h4 className="text-center philia-gold font-black uppercase italic mb-6 border-b border-white/10 pb-3 leading-none text-white text-white">{barber.name}</h4>
                                                                <div className="space-y-2 text-white">
                                                                    {services.map(s => {
                                                                        const isSelected = (barber.skills || []).includes(s.firestoreId);
                                                                        return (
                                                                            <button key={s.firestoreId} onClick={() => toggleSkill(barber.id, barber.skills || [], s.firestoreId)} className={`w-full text-left p-2.5 rounded-xl text-[9px] font-black uppercase transition-all flex justify-between items-center ${isSelected ? 'bg-[#d4af37]/10 text-[#d4af37]' : 'bg-black/10 opacity-30 text-white text-white text-white'}`}>
                                                                                {s.name}
                                                                                <div className={`w-3.5 h-3.5 rounded-full border border-white/10 ${isSelected ? 'bg-[#d4af37]' : 'bg-transparent text-white text-white'}`}></div>
                                                                            </button>
                                                                        );
                                                                    })}
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </section>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    /* --- VISTA COLLABORATORE (ALESSANDRO, CATELLO, ETC) --- */
                                    <div className="space-y-12 text-white text-white text-white text-white text-white">
                                        <AgendaDateNavAdmin />
                                        <div className="max-w-xl mx-auto text-white text-white text-white">
                                            <div className="philia-bg rounded-[40px] border border-white/5 flex flex-col min-h-[500px] shadow-2xl overflow-hidden text-white text-white">
                                                <div className="p-6 border-b border-[#d4af37]/20 text-center bg-gradient-to-b from-black/20 to-transparent text-white text-white">
                                                    <h4 className="philia-gold font-black uppercase italic tracking-tighter text-2xl leading-none text-white text-white">Mio Diario</h4>
                                                    <div className="mt-2 flex items-center justify-center gap-2 text-white">
                                                        <span className="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]"></span>
                                                        <p className="text-[10px] opacity-40 uppercase font-black tracking-widest text-white text-white">{bookings.filter(b => b.barberName === adminUser && b.date === adminAgendaDate).length} APPUNTAMENTI</p>
                                                    </div>
                                                </div>
                                                <div className="p-5 flex-1 overflow-y-auto no-scrollbar text-white">
                                                    {bookings.filter(b => b.barberName === adminUser && b.date === adminAgendaDate).sort((a, b) => a.time.localeCompare(b.time)).map(b => <AppointmentCard key={b.id} b={b} />)}
                                                </div>
                                            </div>
                                        </div>
                                        <section className="max-w-4xl mx-auto space-y-6 pt-10 border-t border-white/5 text-left text-white text-white text-white text-white">
                                            <div className="p-8 bg-[#d4af37]/5 border-2 border-dashed border-[#d4af37]/30 rounded-[40px] text-white">
                                                <h3 className="philia-gold font-black uppercase italic text-xl border-l-4 border-[#d4af37] pl-4 leading-none mb-4 text-white text-white">Mie Ferie e Eccezioni</h3>
                                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                                                    <ExceptionForm targetId={currentCollaborator?.id} isMasterMode={false} />
                                                    <div className="max-h-[500px] overflow-y-auto space-y-3 no-scrollbar text-left text-white text-white text-white text-white">
                                                        <p className="text-[10px] philia-gold font-black uppercase tracking-[3px] mb-4 text-white text-white">Le Mie Eccezioni</p>
                                                        {currentCollaborator && currentCollaborator.dateOverrides && Object.entries(currentCollaborator.dateOverrides).sort().map(([date, h]) => (
                                                            <div key={date} className="philia-bg p-4 rounded-2xl border border-white/10 flex justify-between items-center group text-white">
                                                                <div>
                                                                    <p className="font-black text-sm philia-gold text-white">{date}</p>
                                                                    <p className="text-[9px] uppercase opacity-50 text-white text-white text-white">
                                                                        {h.open ? `${h.amActive ? 'AM OK' : 'AM OFF'} | ${h.pmActive ? 'PM OK' : 'PM OFF'}` : 'ASSENTE'}
                                                                    </p>
                                                                </div>
                                                                <button onClick={()=>removeDateOverride(currentCollaborator.id, date)} className="text-red-500 font-black px-2 hover:scale-125 transition-transform text-white text-white">✕</button>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        </section>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'my-bookings' && (
                            <div className="fade-in max-w-xl mx-auto text-white text-white text-white">
                                <h2 className="text-2xl font-black mb-8 border-l-4 border-[#d4af37] pl-4 italic uppercase tracking-widest text-center sm:text-left tracking-tighter leading-none text-white text-white">LA TUA AGENDA</h2>
                                {bookings.filter(b => b.customerPhone?.toString().replace(/\s+/g, '') === clientPhone?.toString().replace(/\s+/g, '')).sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time)).map(b => (
                                    <div key={b.id} className="philia-bg p-8 rounded-[40px] border border-white/5 mb-5 shadow-2xl flex justify-between items-center transition-all hover:scale-[1.02] text-left text-white text-white text-white">
                                        <div className="flex-1 pr-4 text-white">
                                            <p className="philia-gold font-black text-xs uppercase text-white">{b.date}</p>
                                            <h3 className="font-black text-2xl uppercase italic leading-tight my-1 text-white">{b.serviceName}</h3>
                                            <p className="text-white/40 text-[10px] uppercase font-bold text-white text-white">Per: <span className="text-white font-black">{b.customerName}</span> • Con {b.barberName}</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-4xl font-black philia-gold italic leading-none text-white text-white">{b.time}</p>
                                            <button onClick={async ()=>{if(confirm("Annullare?")) await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('bookings').doc(b.id).delete();}} className="text-red-500/30 text-[9px] font-black uppercase mt-2 block w-full text-right underline italic transition-colors hover:text-red-500">Annulla</button>
                                        </div>
                                    </div>
                                ))}
                                {bookings.filter(b => b.customerPhone?.toString().replace(/\s+/g, '') === clientPhone?.toString().replace(/\s+/g, '')).length === 0 && <p className="opacity-10 text-center py-20 uppercase font-black tracking-widest italic text-sm tracking-[4px] text-white">Ancora nessun taglio</p>}
                            </div>
                        )}

                        {view === 'profile' && (
                            <div className="fade-in max-w-xl mx-auto text-white text-white text-white">
                                <h2 className="text-2xl font-black mb-8 border-l-4 border-[#d4af37] pl-4 italic uppercase tracking-widest text-white text-white text-white">IL TUO PROFILO</h2>
                                <div className="philia-bg p-8 rounded-[40px] border border-white/10 shadow-2xl space-y-8">
                                    <div className="space-y-2">
                                        <label className="text-[10px] uppercase opacity-30 font-black tracking-[3px] ml-2 text-white">Nome e Cognome (Modificabile per futuri tagli)</label>
                                        <input type="text" value={clientName} onChange={(e) => setClientName(e.target.value)} onBlur={saveIdentity} className="w-full bg-black/40 border border-white/5 p-5 rounded-2xl text-xl font-bold text-white outline-none focus:border-[#d4af37] transition-all text-white text-white text-white" />
                                    </div>
                                    <div className="space-y-2 text-white text-white">
                                        <label className="text-[10px] uppercase opacity-30 font-black tracking-[3px] ml-2 text-white text-white">Numero di Cellulare</label>
                                        <div className="w-full bg-black/20 p-5 rounded-2xl text-xl font-black text-[#d4af37] opacity-60 text-white text-white">{clientPhone}</div>
                                    </div>
                                    <div className="pt-6 border-t border-white/5 text-white">
                                        <button onClick={logout} className="w-full bg-red-500/10 text-red-500 p-5 rounded-2xl font-black uppercase text-xs tracking-widest transition-all hover:bg-red-500 hover:text-white text-white text-white">Cambia Utente / Logout</button>
                                    </div>
                                </div>
                                <p className="mt-8 text-center text-[9px] opacity-20 uppercase font-bold leading-relaxed text-white text-white text-white">
                                    Il cambio nome influirà solo sui prossimi appuntamenti.<br/>L'agenda rimane collegata al tuo numero di cellulare.
                                </p>
                            </div>
                        )}
                    </div>

                    <div className="fixed bottom-0 left-0 right-0 philia-bg border-t border-[#d4af37]/10 p-5 flex justify-around items-center max-w-xl mx-auto z-50 rounded-t-[40px] shadow-[0_-20px_50px_rgba(0,0,0,0.5)] text-white text-white text-white text-white">
                        <button onClick={()=>{setView('booking'); setStep(1);}} className={`flex flex-col items-center transition-all ${view === 'booking' ? 'philia-gold scale-125 shadow-[0_0_20px_rgba(212,175,55,0.2)] text-white text-white' : 'text-white/20 text-white'}`}><IconCalendar /><span className="text-[8px] font-black mt-1 uppercase tracking-widest text-white text-white text-white text-white">PRENOTA</span></button>
                        <button onClick={() => setView('profile')} className={`flex flex-col items-center transition-all ${view === 'profile' ? 'philia-gold scale-125 text-white text-white' : 'text-white/20 text-white text-white'}`}><IconUser /><span className="text-[8px] font-black mt-1 uppercase tracking-widest text-white text-white text-white text-white">PROFILO</span></button>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
