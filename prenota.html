<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prenota Philia</title>
    <style>
        body { 
            background-color: #332d2d; 
            margin: 0; 
            padding: 0; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow-x: hidden;
        }
        .header {
            padding: 20px;
            text-align: center;
            background-color: #332d2d;
        }
        .logo { 
            max-width: 150px; 
            height: auto; 
        }
        /* Contenitore rinforzato */
        #my-cal { 
            width: 100%; 
            height: 90vh; /* Usa quasi tutto lo schermo */
            min-height: 600px;
            border: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.png" alt="Philia Logo" class="logo" onerror="this.style.display='none'">
    </div>
    
    <div id="my-cal"></div>

    <script>
      (function (C, A, L) { 
        let p = function (a, ar) { a.q.push(ar); }; 
        let d = C.document; 
        C.Cal = C.Cal || function () { 
          let a = C.Cal; 
          if (!a.q) { a.q = []; } 
          p(a, arguments); 
        }; 
      }(window, "https://app.cal.com/embed/embed.js", "Cal"));
      
      Cal("init", {origin: "https://app.cal.com"});

      Cal("inline", {
        elementOrSelector: "#my-cal",
        calLink: "smil3y-wkidff", 
        config: {
            "theme": "dark"
        }
      });

      // Redirect dopo il successo
      Cal("on", {
        action: "bookingSuccessful",
        callback: (e) => {
          setTimeout(() => {
            // Mandiamo alla index portandoci dietro i dati della prenotazione
            window.location.href = "index.html" + window.location.search; 
          }, 1500);
        }
      });
    </script>
</body>
</html>
