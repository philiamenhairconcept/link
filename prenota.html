<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prenota Philia</title>
    <style>
        /* Sfondo coordinato al logo Philia */
        body { 
            background-color: #332d2d; 
            margin: 0; 
            padding: 0; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }
        .header {
            padding: 20px;
            text-align: center;
            width: 100%;
        }
        .logo { 
            max-width: 150px; 
            height: auto; 
        }
        /* Contenitore per il calendario */
        #my-cal { 
            width: 100%; 
            max-width: 900px; 
            height: 700px; 
            border: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.png" alt="Philia Logo" class="logo" onerror="this.style.display='none'">
    </div>
    
    <div id="my-cal"></div>

    <script>
      // Inizializzazione Cal.com
      (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; let d = C.document; C.Cal = C.Cal || function () { let a = C.Cal; if (!a.q) { a.q = []; } p(a, arguments); }; }(window, "https://app.cal.com/embed/embed.js", "Cal"));
      
      Cal("init", {origin: "https://app.cal.com"});

      // Caricamento del tuo calendario specifico
      Cal("inline", {
        elementOrSelector: "#my-cal",
        calLink: "smil3y-wkidff", 
        config: {
            "theme": "dark",
            "ui": {
                "styles": {
                    "body": { "background": "#332d2d" }
                }
            }
        }
      });

      // IL TRUCCO PER IL REDIRECT GRATUITO
      Cal("on", {
        action: "bookingSuccessful",
        callback: (e) => {
          // Aspettiamo 2 secondi per far godere al cliente il messaggio di conferma
          // e poi lo mandiamo alla pagina che apre l'App o mostra il QR
          setTimeout(() => {
            window.location.href = "index.html"; 
          }, 2000);
        }
      });
    </script>
</body>
</html>
