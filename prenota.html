<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Librerie React e Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #1a1a1a; margin: 0; color: white; }
        .philia-bg { background-color: #332d2d; }
        .philia-gold { color: #d4af37; }
        .philia-btn { background-color: #d4af37; color: #332d2d; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @media (min-width: 768px) {
            .app-container { max-width: 1200px; margin: 2rem auto; border-radius: 24px; border: 1px solid rgba(212, 175, 55, 0.2); min-height: 85vh; }
        }

        /* Supporto per la griglia dell'agenda */
        .agenda-grid {
            display: grid;
            grid-template-columns: 80px repeat(var(--barber-count), 1fr);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- ICONE SVG INTERNE ---
        const IconCalendar = () => <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>;
        const IconClock = () => <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 8v4l3 2m6-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>;
        const IconUser = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>;

        // Palette Colori per Barbieri
        const BARBER_PALETTE = [
            { name: 'Gold', hex: '#d4af37' },
            { name: 'Emerald', hex: '#10b981' },
            { name: 'Sky', hex: '#0ea5e9' },
            { name: 'Rose', hex: '#f43f5e' },
            { name: 'Violet', hex: '#8b5cf6' },
            { name: 'Amber', hex: '#f59e0b' },
            { name: 'Slate', hex: '#64748b' }
        ];

        // --- CONFIGURAZIONE FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCvNKLOIqAz9ygOJ1Cpl4V94xm3VeKhqow",
            authDomain: "philia-men-hair-concept.firebaseapp.com",
            projectId: "philia-men-hair-concept",
            storageBucket: "philia-men-hair-concept.firebasestorage.app",
            messagingSenderId: "470631594940",
            appId: "1:470631594940:web:a259b8ce4a08fc2a0d49b9",
            measurementId: "G-X5V5J1JJC1"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = "philia-v2-production";

        const INITIAL_SERVICES = [
            { id: 'perm_ricci', name: 'Permanente Ricci', price: 30, duration: 60, desc: 'Per un look dinamico e capelli ricci definiti.' },
            { id: 'comp_scrub', name: 'Completo + Scrub Viso', price: 30, duration: 45, desc: 'Il pacchetto relax completo per pelle e capelli.' },
            { id: 'stira_bras', name: 'Stiratura Brasiliana', price: 30, duration: 60, desc: 'Liscio perfetto e duraturo con trattamento professionale.' },
            { id: 'comp_tinta', name: 'Completo + Tinta', price: 27, duration: 45, desc: 'Servizio completo di taglio, barba e colorazione.' },
            { id: 'schia_cap', name: 'Schiaritura Capelli', price: 20, duration: 60, desc: 'Effetto luce naturale per i tuoi capelli.' },
            { id: 'stira_chim', name: 'Stiratura Chimica', price: 20, duration: 60, desc: 'Controllo totale dei capelli ribelli.' },
            { id: 'tratt_ker', name: 'Trattamento Keratina', price: 20, duration: 30, desc: 'Ricostruzione profonda per capelli sani e forti.' },
            { id: 'tratt_crespo', name: 'Trattamento Disciplinare Crespo', price: 20, duration: 30, desc: 'Elimina il crespo e dona morbidezza.' },
            { id: 'completo', name: 'Completo', price: 20, duration: 30, desc: 'Il classico: Taglio, Barba e Shampoo.' },
            { id: 'taglio_shamp', name: 'Taglio + Shampoo', price: 15, duration: 30, desc: 'Taglio professionale con lavaggio relax.' },
            { id: 'taglio_barba', name: 'Taglio + Barba', price: 15, duration: 45, desc: 'Sincronizza il tuo look: capelli e barba curati.' },
            { id: 'ras_scrub', name: 'Rasatura Barba + Scrub Viso', price: 15, duration: 30, desc: 'Pelle rigenerata e barba perfetta.' },
            { id: 'taglio_bimbo_sh', name: 'Taglio Bimbo + Shampoo', price: 13, duration: 30, desc: 'Servizio dedicato ai più piccoli con lavaggio.' },
            { id: 'ras_tinta_barba', name: 'Rasatura + Tinta Barba', price: 12, duration: 15, desc: 'Definizione e colore per una barba impeccabile.' },
            { id: 'taglio_uomo', name: 'Taglio Uomo', price: 10, duration: 30, desc: 'Taglio classico o moderno eseguito a regola d\'arte.' },
            { id: 'barba_shamp', name: 'Barba + Shampoo', price: 10, duration: 30, desc: 'Cura specifica per la barba con detersione.' },
            { id: 'taglio_bambino', name: 'Taglio Bambino', price: 8, duration: 30, desc: 'Taglio veloce e divertente per bambini.' },
            { id: 'barba_panno', name: 'Barba Panno Caldo', price: 8, duration: 30, desc: 'Il rituale tradizionale Philia con panno caldo.' },
            { id: 'shampoo', name: 'Shampoo', price: 5, duration: 15, desc: 'Lavaggio purificante con massaggio cutaneo.' },
            { id: 'rasatura_barba', name: 'Rasatura Barba', price: 5, duration: 15, desc: 'Rifinitura rapida e precisa della tua barba.' }
        ];

        const WEEKDAYS_NAME = ["Domenica", "Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì", "Sabato"];
        const MONTHS_NAME = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];

        function App() {
            const [clientPhone, setClientPhone] = useState(localStorage.getItem('philia_phone') || "");
            const [clientName, setClientName] = useState(localStorage.getItem('philia_name') || "");
            const [isIdentified, setIsIdentified] = useState(!!localStorage.getItem('philia_phone'));
            
            const [view, setView] = useState('booking'); 
            const [adminUser, setAdminUser] = useState(null);
            const [adminSubView, setAdminSubView] = useState('agenda'); 
            const [adminAgendaDate, setAdminAgendaDate] = useState(new Date().toLocaleDateString('sv-SE'));
            
            const [step, setStep] = useState(1);
            const [barbers, setBarbers] = useState([]);
            const [services, setServices] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [settings, setSettings] = useState(null);
            const [loading, setLoading] = useState(true);

            const [staffPassword, setStaffPassword] = useState("philia2024");
            const [tempStaffPwd, setTempStaffPwd] = useState("");

            const [calendarViewDate, setCalendarViewDate] = useState(new Date());
            const [selectedBarber, setSelectedBarber] = useState(null);
            const [selectedService, setSelectedService] = useState(null);
            const [selectedDate, setSelectedDate] = useState(new Date().toLocaleDateString('sv-SE'));
            const [selectedSlot, setSelectedSlot] = useState(null);

            const [clientSelectedDate, setClientSelectedDate] = useState(null);

            const simoneBarber = useMemo(() => barbers.find(b => b.name.trim().toUpperCase() === 'SIMONE'), [barbers]);
            const currentCollaborator = useMemo(() => {
                if (!adminUser) return null;
                return barbers.find(b => b.name.trim().toUpperCase() === adminUser.trim().toUpperCase());
            }, [barbers, adminUser]);

            const isPopStateNav = useRef(false);

            useEffect(() => {
                window.history.replaceState({ view, step, adminUser, adminSubView }, "");
                const handlePopState = (event) => {
                    if (event.state) {
                        isPopStateNav.current = true;
                        setView(event.state.view);
                        setStep(event.state.step);
                        setAdminUser(event.state.adminUser);
                        setAdminSubView(event.state.adminSubView);
                        setTimeout(() => isPopStateNav.current = false, 50);
                    }
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            useEffect(() => {
                if (!isPopStateNav.current && isIdentified) {
                    const currentState = window.history.state;
                    const hasChanged = !currentState || currentState.view !== view || currentState.step !== step || currentState.adminUser !== adminUser || currentState.adminSubView !== adminSubView;
                    if (hasChanged) window.history.pushState({ view, step, adminUser, adminSubView }, "");
                }
            }, [view, step, adminUser, adminSubView, isIdentified]);

            useEffect(() => {
                let unsubBookings = null;
                let unsubConfig = null;
                let unsubAuth = null;
                let unsubServices = null;
                let unsubBarbers = null;

                auth.onAuthStateChanged(async (u) => {
                    if (!u) await auth.signInAnonymously();
                    
                    const basePath = db.collection('artifacts').doc(appId).collection('public').doc('data');
                    
                    unsubConfig = basePath.collection('config').doc('schedule').onSnapshot(doc => { 
                        if (doc.exists) setSettings(doc.data()); 
                        else {
                            const initHours = {};
                            [0,1,2,3,4,5,6].forEach(d => {
                                initHours[d] = { open: (d !== 0 && d !== 1), am: ['09:00', '13:00'], pm: ['15:30', '20:30'], amActive: true, pmActive: true };
                            });
                            basePath.collection('config').doc('schedule').set({ openingHours: initHours }, { merge: true });
                        }
                    });

                    unsubAuth = basePath.collection('config').doc('auth').onSnapshot(doc => { if (doc.exists && doc.data().password) { setStaffPassword(doc.data().password); setTempStaffPwd(doc.data().password); } });
                    
                    unsubServices = basePath.collection('services').onSnapshot(snap => {
                        let data = snap.docs.map(d => ({ firestoreId: d.id, ...d.data() }));
                        if (data.length === 0) { INITIAL_SERVICES.forEach(s => basePath.collection('services').add(s)); }
                        setServices(data.sort((a,b) => b.price - a.price));
                    });
                    
                    unsubBarbers = basePath.collection('barbers').onSnapshot(snap => { setBarbers(snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order || 0) - (b.order || 0))); });
                    
                    unsubBookings = basePath.collection('bookings').onSnapshot(snap => { 
                        setBookings(snap.docs.map(d => ({id: d.id, ...d.data()}))); 
                    }, (err) => console.log("Firebase error:", err));

                    setLoading(false);
                });

                return () => {
                    if(unsubBookings) unsubBookings();
                    if(unsubConfig) unsubConfig();
                    if(unsubAuth) unsubAuth();
                    if(unsubServices) unsubServices();
                    if(unsubBarbers) unsubBarbers();
                };
            }, []);

            const saveIdentity = () => {
                const trimmedPhone = clientPhone.toString().trim().replace(/\s+/g, '');
                const trimmedName = clientName.trim();
                if (trimmedPhone.length < 9 || trimmedName.length < 2) return alert("Inserisci Nome e Cellulare validi.");
                localStorage.setItem('philia_phone', trimmedPhone);
                localStorage.setItem('philia_name', trimmedName);
                setClientPhone(trimmedPhone);
                setClientName(trimmedName);
                setIsIdentified(true);
            };

            const logout = () => { if(confirm("Vuoi cambiare utente o disconnetterti?")) { localStorage.removeItem('philia_phone'); localStorage.removeItem('philia_name'); window.location.reload(); } };

            const handleConfirm = async () => {
                const booking = {
                    customerName: clientName.trim(), 
                    customerPhone: clientPhone.toString().trim().replace(/\s+/g, ''),
                    barberId: selectedBarber.id, barberName: selectedBarber.name,
                    serviceId: selectedService.firestoreId || selectedService.id, serviceName: selectedService.name,
                    date: selectedDate, time: selectedSlot,
                    duration: selectedService.duration || 30,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                };
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('bookings').add(booking);
                alert("Appuntamento fissato! ✂️");
                setView('my-bookings');
                setStep(1);
            };

            const timeToMinutes = (timeStr) => { const [h, m] = timeStr.split(':').map(Number); return h * 60 + m; };

            const getFreeSlots = () => {
                if (!settings || !selectedBarber || !selectedService) return [];
                const d = new Date(selectedDate);
                const day = d.getDay();
                const serviceDuration = selectedService.duration || 30;

                const defaultHours = { open: true, am: ['09:00', '13:00'], pm: ['15:30', '20:30'], amActive: true, pmActive: true };
                let hours = (selectedBarber.dateOverrides?.[selectedDate]) || 
                            (settings?.dateOverrides?.[selectedDate]) || 
                            (selectedBarber.personalSchedule?.[day]) || 
                            (settings?.openingHours?.[day]) || 
                            defaultHours;

                if (!hours || !hours.open) return [];
                const now = new Date();
                const todayStr = new Date().toLocaleDateString('sv-SE');
                const currentTotalMinutes = now.getHours() * 60 + now.getMinutes();
                let slots = [];
                const occupied = bookings.filter(b => b.date === selectedDate && b.barberId === selectedBarber.id);
                const gen = (start, end) => {
                    if (!start || !end) return;
                    let curMin = timeToMinutes(start);
                    const endMin = timeToMinutes(end);
                    while (curMin + serviceDuration <= endMin) {
                        const h = Math.floor(curMin / 60).toString().padStart(2, '0');
                        const m = (curMin % 60).toString().padStart(2, '0');
                        const timeStr = `${h}:${m}`;
                        const isPast = (selectedDate === todayStr && curMin <= currentTotalMinutes);
                        const isBooked = occupied.some(b => {
                            const bStart = timeToMinutes(b.time);
                            const bEnd = bStart + (b.duration || 30);
                            return (curMin < bEnd && (curMin + serviceDuration) > bStart);
                        });
                        if (!isPast && !isBooked) slots.push(timeStr);
                        curMin += serviceDuration;
                    }
                };
                if (hours.am && (hours.amActive !== false)) gen(hours.am[0], hours.am[1]);
                if (hours.pm && (hours.pmActive !== false)) gen(hours.pm[0], hours.pm[1]);
                return slots;
            };

            const changeMonth = (offset) => { const newDate = new Date(calendarViewDate); newDate.setMonth(newDate.getMonth() + offset); setCalendarViewDate(newDate); };
            const changeAgendaDate = (offset) => { const current = new Date(adminAgendaDate + 'T00:00:00'); current.setDate(current.getDate() + offset); setAdminAgendaDate(current.toLocaleDateString('sv-SE')); };

            const addOrUpdateService = async () => {
                if (!editingService.name || !editingService.price) return alert("Dati obbligatori mancanti.");
                const coll = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('services');
                const { firestoreId, ...dataToSave } = editingService;
                if (firestoreId) await coll.doc(firestoreId).update(dataToSave);
                else await coll.add({ ...dataToSave, id: Date.now().toString() });
                setEditingService({ name: '', price: '', desc: '', duration: 30, firestoreId: null });
                alert("Catalogo aggiornato!");
            };

            const deleteService = async (id) => { if (confirm("Eliminare definitivamente?")) await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('services').doc(id).delete(); };

            const forceResetCatalog = async () => {
                if(confirm("Questa operazione caricherà i 20 servizi di base Philia. Procedere?")) {
                    const coll = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('services');
                    INITIAL_SERVICES.forEach(s => coll.add(s));
                    alert("Listino resettato!");
                }
            };

            const toggleSkill = async (barberId, barberSkills, serviceId) => {
                const skillsArr = barberSkills || [];
                const newSkills = skillsArr.includes(serviceId) ? skillsArr.filter(id => id !== serviceId) : [...skillsArr, serviceId];
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('barbers').doc(barberId).update({ skills: newSkills });
            };

            const updateBarberColor = async (barberId, color) => {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('barbers').doc(barberId).update({ color });
            };

            const addNewBarber = async () => {
                const name = prompt("Nome barbiere:").toUpperCase(); if (!name) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('barbers').add({ name, skills: services.map(s => s.firestoreId), order: barbers.length + 1, personalSchedule: {}, dateOverrides: {}, color: '#d4af37' });
            };

            const removeBarber = async (id, name) => { if (confirm(`Rimuovere ${name}?`)) await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('barbers').doc(id).delete(); };

            const addDateOverride = async (targetId, isGlobal = false) => {
                if (!newExc.date) return alert("Scegli una data.");
                const payload = { open: newExc.open, am: newExc.am || ['09:00', '13:00'], pm: newExc.pm || ['15:30', '20:30'], amActive: newExc.amActive, pmActive: newExc.pmActive };
                try {
                    const basePath = db.collection('artifacts').doc(appId).collection('public').doc('data');
                    if (isGlobal) {
                        const newOverrides = { ...(settings?.dateOverrides || {}) };
                        newOverrides[newExc.date] = payload;
                        await basePath.collection('config').doc('schedule').set({ dateOverrides: newOverrides }, { merge: true });
                    } else {
                        const bId = targetId || simoneBarber?.id;
                        const barber = barbers.find(x => x.id === bId);
                        if (!barber) return alert("Errore barbiere.");
                        const newOverrides = { ...(barber.dateOverrides || {}) };
                        newOverrides[newExc.date] = payload;
                        await basePath.collection('barbers').doc(barber.id).set({ dateOverrides: newOverrides }, { merge: true });
                    }
                    setNewExc({ date: '', open: false, am: ['09:00', '13:00'], pm: ['15:30', '20:30'], amActive: true, pmActive: true });
                    alert("Salvataggio completato! ✅");
                } catch (e) { alert("Errore database."); }
            };

            const removeDateOverride = async (targetId, dateKey, isGlobal = false) => {
                try {
                    const basePath = db.collection('artifacts').doc(appId).collection('public').doc('data');
                    if (isGlobal) {
                        await basePath.collection('config').doc('schedule').update({
                            [`dateOverrides.${dateKey}`]: firebase.firestore.FieldValue.delete()
                        });
                    } else {
                        await basePath.collection('barbers').doc(targetId).update({
                            [`dateOverrides.${dateKey}`]: firebase.firestore.FieldValue.delete()
                        });
                    }
                } catch (e) { alert("Errore nella cancellazione."); }
            };

            const updateStaffPassword = async () => {
                if (!tempStaffPwd || tempStaffPwd.length < 4) return alert("Inserisci una password valida (min. 4 caratteri).");
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('auth').set({ password: tempStaffPwd }, { merge: true });
                    alert("Password aggiornata correttamente! 🔐");
                } catch (e) { alert("Errore nel salvataggio."); }
            };

            const updateWeeklySchedule = async (dayIdx, field, value) => {
                const newSchedule = { ...(settings?.openingHours || {}) };
                if (!newSchedule[dayIdx]) newSchedule[dayIdx] = { open: true, am: ['09:00', '13:00'], pm: ['15:30', '20:30'], amActive: true, pmActive: true };
                
                if (field === 'open') newSchedule[dayIdx].open = value;
                else if (field === 'amActive') newSchedule[dayIdx].amActive = value;
                else if (field === 'pmActive') newSchedule[dayIdx].pmActive = value;
                else if (field === 'am0') newSchedule[dayIdx].am[0] = value;
                else if (field === 'am1') newSchedule[dayIdx].am[1] = value;
                else if (field === 'pm0') newSchedule[dayIdx].pm[0] = value;
                else if (field === 'pm1') newSchedule[dayIdx].pm[1] = value;

                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('schedule').set({ openingHours: newSchedule }, { merge: true });
                } catch (e) { alert("Errore aggiornamento orari."); }
            };

            // --- VISTA UNIFICATA AGENDA (REINVENTATA PER DURATE VARIABILI) ---
            const UnifiedAgenda = () => {
                const dayTimes = useMemo(() => {
                    const times = [];
                    for(let h=5; h<=23; h++) {
                        for(let m=0; m<60; m+=15) {
                            times.push(`${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`);
                        }
                    }
                    times.push(`24:00`);
                    return times;
                }, []);

                const getInitials = (name) => name ? name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2) : "??";

                return (
                    <div className="bg-[#1a1a1a] rounded-[30px] border border-white/5 shadow-2xl overflow-hidden mb-10">
                        <div className="p-6 bg-[#332d2d] border-b border-[#d4af37]/20 flex justify-between items-center text-white">
                            <button onClick={() => changeAgendaDate(-1)} className="p-3 bg-black/20 rounded-full philia-gold">←</button>
                            <div className="text-center">
                                <p className="text-[10px] philia-gold font-black uppercase tracking-[3px]">
                                    {new Date(adminAgendaDate + 'T00:00:00').toLocaleDateString('it-IT', { weekday: 'long' })}
                                </p>
                                <h3 className="text-xl font-black italic uppercase">{new Date(adminAgendaDate + 'T00:00:00').toLocaleDateString('it-IT', { day: 'numeric', month: 'long' })}</h3>
                            </div>
                            <button onClick={() => changeAgendaDate(1)} className="p-3 bg-black/20 rounded-full philia-gold">→</button>
                        </div>

                        <div className="overflow-x-auto no-scrollbar">
                            <div className="min-w-[800px] relative">
                                <div className="grid grid-cols-[80px_1fr] bg-black/20 border-b border-white/5 sticky top-0 z-10">
                                    <div className="p-4 text-[10px] opacity-30 font-black flex items-center justify-center">ORA</div>
                                    <div className="grid" style={{ gridTemplateColumns: `repeat(${barbers.length || 1}, 1fr)` }}>
                                        {barbers.map(b => (
                                            <div key={b.id} className="p-4 text-center font-black text-xs border-l border-white/5 uppercase italic" style={{ color: b.color || '#d4af37' }}>{b.name}</div>
                                        ))}
                                    </div>
                                </div>

                                <div className="relative">
                                    {dayTimes.map((time, timeIdx) => {
                                        const isMainSlot = time.endsWith(':00') || time.endsWith(':30');
                                        return (

                                                                        <p className="font-bold text-white text-xs uppercase italic">{b.barberName}</p>
                                                                    </div>
                                                                    <div className="w-6 h-6 rounded-full flex items-center justify-center font-black text-[8px] border border-white/20" style={{ backgroundColor: barbers.find(x => x.id === b.barberId)?.color || '#d4af37', color: '#1a1a1a' }}>
                                                                        {b.barberName.substring(0,2).toUpperCase()}
                                                                    </div>
                                                                </div>
                                                            </div>

                                                            {!isCompleted && (
                                                                <button 
                                                                    type="button" 
                                                                    onClick={async () => {
                                                                        if(confirm("Vuoi davvero annullare questo appuntamento?")) {
                                                                            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('bookings').doc(b.id).delete();
                                                                        }
                                                                    }} 
                                                                    className="w-full py-3 text-[9px] font-black uppercase text-red-500/50 border border-red-500/20 rounded-xl hover:bg-red-500/5 hover:text-red-500 transition-all"
                                                                >
                                                                    Annulla questo Appuntamento
                                                                </button>
                                                            )}
                                                        </div>
                                                    );
                                                })}
                                            {bookings.filter(b => b.customerPhone?.toString().replace(/\s+/g, '') === clientPhone?.toString().replace(/\s+/g, '') && b.date === clientSelectedDate).length === 0 && (
                                                <p className="text-center opacity-40 text-xs italic py-4">Nessun appuntamento trovato per oggi.</p>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'profile' && (
                            <div className="fade-in max-w-xl mx-auto text-white">
                                <h2 className="text-2xl font-black mb-8 border-l-4 border-[#d4af37] pl-4 italic uppercase tracking-widest text-white">IL TUO PROFILO</h2>
                                <div className="philia-bg p-8 rounded-[40px] border border-white/10 shadow-2xl space-y-8">
                                    <div className="space-y-2">
                                        <label className="text-[10px] uppercase opacity-30 font-black tracking-[3px] ml-2">Nome e Cognome</label>
                                        <input type="text" value={clientName} onChange={(e) => setClientName(e.target.value)} onBlur={saveIdentity} className="w-full bg-black/40 border border-white/5 p-5 rounded-2xl text-xl font-bold text-white outline-none" />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] uppercase opacity-30 font-black tracking-[3px] ml-2">Cellulare</label>
                                        <div className="w-full bg-black/20 p-5 rounded-2xl text-xl font-black text-[#d4af37] opacity-60">{clientPhone}</div>
                                    </div>
                                    <div className="pt-6 border-t border-white/5">
                                        <button type="button" onClick={logout} className="w-full bg-red-500/10 text-red-500 p-5 rounded-2xl font-black uppercase text-xs tracking-widest">Cambia Utente / Logout</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="fixed bottom-0 left-0 right-0 philia-bg border-t border-white/5 p-5 flex justify-around items-center max-w-xl mx-auto z-50 rounded-t-[40px] shadow-[0_-20px_50px_rgba(0,0,0,0.5)]">
                        <button type="button" onClick={()=>{setView('booking'); setStep(1);}} className={`flex flex-col items-center transition-all ${view === 'booking' ? 'philia-gold scale-125' : 'text-white/20'}`}><IconCalendar /><span className="text-[8px] font-black mt-1 uppercase tracking-widest">PRENOTA</span></button>
                        <button type="button" onClick={()=>setView('my-bookings')} className={`flex flex-col items-center transition-all ${view === 'my-bookings' ? 'philia-gold scale-125' : 'text-white/20'}`}><IconClock /><span className="text-[8px] font-black mt-1 uppercase tracking-widest">AGENDA</span></button>
                        <button type="button" onClick={() => setView('profile')} className={`flex flex-col items-center transition-all ${view === 'profile' ? 'philia-gold scale-125' : 'text-white/20'}`}><IconUser /><span className="text-[8px] font-black mt-1 uppercase tracking-widest">PROFILO</span></button>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
