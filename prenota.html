<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philia - Men Hair Concept</title>
    <!-- Librerie React e Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #1a1a1a; margin: 0; color: white; }
        .philia-bg { background-color: #332d2d; }
        .philia-gold { color: #d4af37; }
        .philia-btn { background-color: #d4af37; color: #332d2d; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @media (min-width: 768px) {
            .app-container { max-width: 1200px; margin: 2rem auto; border-radius: 24px; border: 1px solid rgba(212, 175, 55, 0.2); min-height: 85vh; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONFIGURAZIONE FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCvNKLOIqAz9ygOJ1Cpl4V94xm3VeKhqow",
            authDomain: "philia-men-hair-concept.firebaseapp.com",
            projectId: "philia-men-hair-concept",
            storageBucket: "philia-men-hair-concept.firebasestorage.app",
            messagingSenderId: "470631594940",
            appId: "1:470631594940:web:a259b8ce4a08fc2a0d49b9",
            measurementId: "G-X5V5J1JJC1"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = "philia-v2-production";

        const MASTER_SERVICES = [
            { id: 'perm_ricci', name: 'Permanente Ricci', price: 30, duration: 60 },
            { id: 'comp_scrub', name: 'Completo + Scrub Viso', price: 30, duration: 45 },
            { id: 'stira_bras', name: 'Stiratura Brasiliana', price: 30, duration: 60 },
            { id: 'comp_tinta', name: 'Completo + Tinta', price: 27, duration: 45 },
            { id: 'schia_cap', name: 'Schiaritura Capelli', price: 20, duration: 60 },
            { id: 'stira_chim', name: 'Stiratura Chimica', price: 20, duration: 60 },
            { id: 'tratt_ker', name: 'Trattamento Keratina', price: 20, duration: 30 },
            { id: 'tratt_crespo', name: 'Trattamento Disciplinare Crespo', price: 20, duration: 30 },
            { id: 'completo', name: 'Completo', price: 20, duration: 30 },
            { id: 'taglio_shamp', name: 'Taglio + Shampoo', price: 15, duration: 30 },
            { id: 'taglio_barba', name: 'Taglio + Barba', price: 15, duration: 45 },
            { id: 'ras_scrub', name: 'Rasatura Barba + Scrub Viso', price: 15, duration: 30 },
            { id: 'taglio_bimbo_sh', name: 'Taglio Bimbo + Shampoo', price: 13, duration: 30 },
            { id: 'ras_tinta_barba', name: 'Rasatura + Tinta Barba', price: 12, duration: 15 },
            { id: 'taglio_uomo', name: 'Taglio Uomo', price: 10, duration: 30 },
            { id: 'barba_shamp', name: 'Barba + Shampoo', price: 10, duration: 30 },
            { id: 'taglio_bambino', name: 'Taglio Bambino', price: 8, duration: 30 },
            { id: 'barba_panno', name: 'Barba Panno Caldo', price: 8, duration: 30 },
            { id: 'shampoo', name: 'Shampoo', price: 5, duration: 15 },
            { id: 'rasatura_barba', name: 'Rasatura Barba', price: 5, duration: 15 }
        ];

        const DAYS_NAME = ["Domenica", "Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì", "Sabato"];

        function App() {
            const [clientPhone, setClientPhone] = useState(localStorage.getItem('philia_phone') || "");
            const [clientName, setClientName] = useState(localStorage.getItem('philia_name') || "");
            const [isIdentified, setIsIdentified] = useState(!!localStorage.getItem('philia_phone'));
            
            const [view, setView] = useState('booking'); 
            const [adminUser, setAdminUser] = useState(null);
            const [adminSubView, setAdminSubView] = useState('agenda'); // 'agenda' o 'gestione' per Simone
            const [step, setStep] = useState(1);
            const [barbers, setBarbers] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [settings, setSettings] = useState(null);
            const [loading, setLoading] = useState(true);

            const [selectedBarber, setSelectedBarber] = useState(null);
            const [selectedService, setSelectedService] = useState(null);
            const [selectedDate, setSelectedDate] = useState(new Date().toLocaleDateString('en-CA'));
            const [selectedSlot, setSelectedSlot] = useState(null);

            const [newExc, setNewExc] = useState({ 
                date: '', 
                open: false, 
                am: ['09:00', '13:00'], 
                pm: ['15:30', '20:30'] 
            });

            useEffect(() => {
                auth.onAuthStateChanged(async (u) => {
                    if (!u) await auth.signInAnonymously();
                    setLoading(false);
                });

                const basePath = db.collection('artifacts').doc(appId).collection('public').doc('data');

                basePath.collection('config').doc('schedule').onSnapshot(doc => {
                    if (doc.exists) setSettings(doc.data());
                });

                basePath.collection('barbers').onSnapshot(snap => {
                    let data = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    setBarbers(data.sort((a,b) => a.order - b.order));
                });

                basePath.collection('bookings').onSnapshot(snap => {
                    setBookings(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });
            }, []);

            const saveIdentity = () => {
                if (clientPhone.length < 9 || clientName.length < 2) {
                    alert("Inserisci Nome e Cellulare validi.");
                    return;
                }
                localStorage.setItem('philia_phone', clientPhone);
                localStorage.setItem('philia_name', clientName);
                setIsIdentified(true);
            };

            const handleConfirm = async () => {
                const booking = {
                    customerName: clientName,
                    customerPhone: clientPhone,
                    barberId: selectedBarber.id,
                    barberName: selectedBarber.name,
                    serviceId: selectedService.id,
                    serviceName: selectedService.name,
                    date: selectedDate,
                    time: selectedSlot,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                };
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('bookings').add(booking);
                alert("✂️ Appuntamento fissato!");
                setView('my-bookings');
                setStep(1);
            };

            const getFreeSlots = () => {
                if (!settings || !selectedBarber) return [];
                const d = new Date(selectedDate);
                const day = d.getDay();
                
                let hours = null;
                if (selectedBarber.dateOverrides?.[selectedDate]) {
                    hours = selectedBarber.dateOverrides[selectedDate];
                } else if (settings.dateOverrides?.[selectedDate]) {
                    hours = settings.dateOverrides[selectedDate];
                } else if (selectedBarber.personalSchedule?.[day]) {
                    hours = selectedBarber.personalSchedule[day];
                } else {
                    hours = settings.openingHours[day];
                }

                if (!hours || !hours.open) return [];

                const now = new Date();
                const todayStr = now.toLocaleDateString('en-CA');
                const currentHourMin = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

                let slots = [];
                const gen = (s, e) => {
                    if (!s || !e) return;
                    let cur = new Date(`2000-01-01T${s}:00`);
                    const end = new Date(`2000-01-01T${e}:00`);
                    while (cur <= new Date(end.getTime() - 30 * 60000)) {
                        const timeStr = cur.toTimeString().substring(0, 5);
                        if (selectedDate !== todayStr || timeStr > currentHourMin) {
                            slots.push(timeStr);
                        }
                        cur.setMinutes(cur.getMinutes() + 30);
                    }
                };
                
                if (hours.am) gen(hours.am[0], hours.am[1]);
                if (hours.pm) gen(hours.pm[0], hours.pm[1]);
                
                const occupied = bookings.filter(b => b.date === selectedDate && b.barberId === selectedBarber.id).map(b => b.time);
                return slots.filter(s => !occupied.includes(s));
            };

            const updateSchedule = async (day, field, value) => {
                const newHours = { ...settings.openingHours };
                if (field === 'open') newHours[day].open = value;
                else if (field === 'am_start') newHours[day].am[0] = value;
                else if (field === 'am_end') newHours[day].am[1] = value;
                else if (field === 'pm_start') newHours[day].pm[0] = value;
                else if (field === 'pm_end') newHours[day].pm[1] = value;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('schedule').update({ openingHours: newHours });
            };

            const updatePersonalSchedule = async (barberId, day, field, value) => {
                const barber = barbers.find(b => b.id === barberId);
                const newPersonalSchedule = { ...(barber.personalSchedule || {}) };
                if (!newPersonalSchedule[day]) newPersonalSchedule[day] = { open: true, am: ['09:00', '13:00'], pm: ['15:30', '20:30'] };
                if (field === 'open') newPersonalSchedule[day].open = value;
                else if (field === 'am_start') newPersonalSchedule[day].am[0] = value;
                else if (field === 'am_end') newPersonalSchedule[day].am[1] = value;
                else if (field === 'pm_start') newPersonalSchedule[day].pm[0] = value;
                else if (field === 'pm_end') newPersonalSchedule[day].pm[1] = value;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('barbers').doc(barberId).update({ personalSchedule: newPersonalSchedule });
            };

            const addDateOverride = async (targetId, isGlobal = false) => {
                if (!newExc.date) return alert("Scegli una data!");
                const payload = { open: newExc.open, am: newExc.am, pm: newExc.pm };
                
                if (isGlobal) {
                    const newOverrides = { ...(settings.dateOverrides || {}) };
                    newOverrides[newExc.date] = payload;
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('schedule').update({ dateOverrides: newOverrides });
                } else {
                    const barber = barbers.find(b => b.id === targetId);
                    const newOverrides = { ...(barber.dateOverrides || {}) };
                    newOverrides[newExc.date] = payload;
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('barbers').doc(targetId).update({ dateOverrides: newOverrides });
                }
                setNewExc({ date: '', open: false, am: ['09:00', '13:00'], pm: ['15:30', '20:30'] });
                alert("Salvataggio completato!");
            };

            const removeDateOverride = async (targetId, dateKey, isGlobal = false) => {
                if (isGlobal) {
                    const newOverrides = { ...settings.dateOverrides };
                    delete newOverrides[dateKey];
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('schedule').update({ dateOverrides: newOverrides });
                } else {
                    const barber = barbers.find(b => b.id === targetId);
                    const newOverrides = { ...barber.dateOverrides };
                    delete newOverrides[dateKey];
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('barbers').doc(targetId).update({ dateOverrides: newOverrides });
                }
            };

            const toggleSkill = async (barberId, barberSkills, serviceId) => {
                const skillsArr = barberSkills || [];
                const newSkills = skillsArr.includes(serviceId) ? skillsArr.filter(id => id !== serviceId) : [...skillsArr, serviceId];
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('barbers').doc(barberId).update({ skills: newSkills });
            };

            const addNewBarber = async () => {
                const name = prompt("Nome barbiere:").toUpperCase();
                if (!name) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('barbers').add({
                    name: name, skills: MASTER_SERVICES.map(s => s.id), order: barbers.length + 1, personalSchedule: {}, dateOverrides: {}
                });
            };

            const removeBarber = async (id, name) => {
                if (confirm(`Rimuovere ${name}?`)) await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('barbers').doc(id).delete();
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-[#1a1a1a] text-[#d4af37] font-bold tracking-[5px]">PHILIA...</div>;

            if (!isIdentified) return (
                <div className="h-screen flex items-center justify-center bg-[#1a1a1a] p-6 text-center text-white">
                    <div className="fade-in max-w-sm w-full philia-bg p-10 rounded-[40px] border border-[#d4af37]/20 shadow-2xl">
                        <h1 className="text-4xl font-black philia-gold mb-2 italic uppercase text-center">Philia</h1>
                        <p className="text-white/30 text-[10px] uppercase tracking-[4px] mb-10 leading-relaxed text-center">Benvenuto nel Salone</p>
                        <div className="space-y-4 mb-8 text-left">
                            <input type="text" value={clientName} onChange={(e)=>setClientName(e.target.value)} className="w-full bg-black/40 border border-white/10 p-4 rounded-2xl text-white font-bold outline-none focus:border-[#d4af37]" placeholder="Nome" />
                            <input type="tel" value={clientPhone} onChange={(e)=>setClientPhone(e.target.value)} className="w-full bg-black/40 border border-white/10 p-4 rounded-2xl text-white font-bold outline-none focus:border-[#d4af37]" placeholder="Cellulare" />
                        </div>
                        <button onClick={saveIdentity} className="w-full philia-btn p-5 rounded-2xl font-black uppercase text-xs shadow-xl hover:scale-105 transition-all">Accedi</button>
                        <button onClick={()=>{ if(prompt("Password Staff:") === "philia2024") { setIsIdentified(true); setView('admin-login'); }}} className="mt-10 text-[9px] text-white/10 uppercase tracking-widest block mx-auto">Area Staff</button>
                    </div>
                </div>
            );

            return (
                <div className="app-container min-h-screen pb-24 shadow-2xl relative bg-[#1a1a1a] flex flex-col overflow-hidden text-white">
                    {/* Header */}
                    <div className="p-6 philia-bg border-b border-[#d4af37]/20 flex justify-between items-center sticky top-0 z-50">
                        <h1 className="text-xl font-black philia-gold uppercase italic">Philia</h1>
                        <button onClick={() => { if(prompt("Password:") === "philia2024") setView('admin-login'); }} className="text-white/10 hover:text-[#d4af37]">⚙️</button>
                    </div>

                    <div className="flex-1 overflow-y-auto p-6 md:p-10 no-scrollbar">
                        {view === 'booking' && (
                            <div className="fade-in max-w-xl mx-auto">
                                {step === 1 && (
                                    <div className="grid grid-cols-1 gap-4">
                                        <h2 className="text-center text-xl font-black philia-gold italic uppercase mb-6 tracking-widest">Scegli lo Specialista</h2>
                                        {barbers.map(b => (
                                            <button key={b.id} onClick={()=>{setSelectedBarber(b); setStep(2);}} className="w-full philia-bg p-8 rounded-[30px] border-2 border-white/5 hover:border-[#d4af37] font-black uppercase italic text-2xl tracking-widest transition-all shadow-xl">{b.name}</button>
                                        ))}
                                    </div>
                                )}
                                {step === 2 && (
                                    <div className="fade-in">
                                        <button onClick={()=>setStep(1)} className="philia-gold text-[10px] font-black mb-6 uppercase tracking-widest">← Indietro</button>
                                        <h2 className="text-xl font-black mb-8 border-l-4 border-[#d4af37] pl-4 uppercase italic leading-tight">Servizi di {selectedBarber.name}</h2>
                                        <div className="grid gap-3">
                                            {MASTER_SERVICES.filter(s => (selectedBarber.skills || []).includes(s.id)).map(s => (
                                                <button key={s.id} onClick={()=>{setSelectedService(s); setStep(3);}} className="w-full philia-bg p-6 rounded-2xl border border-white/5 flex justify-between items-center hover:border-[#d4af37] transition-all">
                                                    <div className="text-left font-bold text-lg uppercase leading-tight">{s.name}</div>
                                                    <p className="philia-gold font-black text-2xl italic">€{s.price}</p>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                {step === 3 && (
                                    <div className="fade-in">
                                        <button onClick={()=>setStep(2)} className="philia-gold text-[10px] font-black mb-6 uppercase tracking-widest">← Indietro</button>
                                        <div className="philia-bg p-6 rounded-3xl mb-8 border border-white/5 shadow-inner text-center">
                                            <input type="date" value={selectedDate} min={new Date().toLocaleDateString('en-CA')} onChange={(e)=>setSelectedDate(e.target.value)} className="bg-transparent text-white font-black text-2xl text-center outline-none w-full" />
                                        </div>
                                        <div className="grid grid-cols-3 sm:grid-cols-4 gap-3">
                                            {getFreeSlots().map(slot => (
                                                <button key={slot} onClick={()=>{setSelectedSlot(slot); setStep(4);}} className={`p-4 rounded-xl font-black text-sm transition-all ${selectedSlot === slot ? 'philia-btn scale-105 shadow-xl shadow-[#d4af37]/20' : 'bg-[#332d2d] border border-white/5'}`}>{slot}</button>
                                            ))}
                                            {getFreeSlots().length === 0 && <p className="col-span-full text-center opacity-20 italic py-10 uppercase text-[10px] tracking-[4px]">Chiuso o al completo</p>}
                                        </div>
                                    </div>
                                )}
                                {step === 4 && (
                                    <div className="fade-in space-y-6 text-center">
                                        <button onClick={()=>setStep(3)} className="philia-gold text-[10px] font-black mb-6 uppercase tracking-widest">← Indietro</button>
                                        <div className="philia-bg p-8 rounded-[40px] border border-[#d4af37]/20 shadow-2xl text-center">
                                            <p className="font-black text-2xl philia-gold uppercase italic mb-8 leading-tight">{selectedService.name}</p>
                                            <div className="bg-black/20 py-6 px-10 rounded-3xl border border-white/5 inline-block">
                                                <p className="font-bold text-lg mb-1 tracking-tight">{selectedDate}</p>
                                                <p className="philia-gold font-black text-4xl italic">{selectedSlot}</p>
                                            </div>
                                            <p className="text-[10px] mt-8 text-white/30 uppercase font-black">Cliente: {clientName}</p>
                                        </div>
                                        <button onClick={handleConfirm} className="w-full philia-btn p-6 rounded-[30px] font-black text-xl uppercase shadow-2xl active:scale-95 transition-all">CONFERMA</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'admin-login' && (
                            <div className="fade-in max-w-xl mx-auto py-10 text-center text-white">
                                <h2 className="text-3xl font-black philia-gold mb-12 italic uppercase tracking-widest leading-none">Area Staff</h2>
                                <div className="grid gap-4">
                                    <button onClick={()=>{setAdminUser('SIMONE'); setView('admin'); setAdminSubView('agenda');}} className="w-full philia-btn p-8 rounded-3xl font-black text-2xl italic uppercase shadow-2xl scale-105 transition-all">SIMONE (MASTER)</button>
                                    {barbers.filter(b => b.name !== 'SIMONE').map(b => (
                                        <button key={b.id} onClick={()=>{setAdminUser(b.name); setView('admin');}} className="w-full philia-bg p-6 rounded-3xl font-black text-xl italic uppercase border border-white/10 hover:border-[#d4af37] transition-all">{b.name}</button>
                                    ))}
                                    <button onClick={()=>setView('booking')} className="mt-10 text-white/20 uppercase font-black text-[10px] tracking-widest hover:text-white">Torna al Salone</button>
                                </div>
                            </div>
                        )}

                        {view === 'admin' && (
                            <div className="space-y-6 pb-20 fade-in text-white">
                                {/* Navigazione Simone Master */}
                                {adminUser === 'SIMONE' && (
                                    <div className="flex gap-2 p-2 bg-black/20 rounded-2xl mb-8">
                                        <button onClick={() => setAdminSubView('agenda')} className={`flex-1 p-4 rounded-xl font-black uppercase italic text-xs transition-all ${adminSubView === 'agenda' ? 'philia-btn shadow-lg' : 'text-white/40'}`}>Agenda</button>
                                        <button onClick={() => setAdminSubView('gestione')} className={`flex-1 p-4 rounded-xl font-black uppercase italic text-xs transition-all ${adminSubView === 'gestione' ? 'philia-btn shadow-lg' : 'text-white/40'}`}>Gestione Salone</button>
                                    </div>
                                )}

                                <div className="flex justify-between items-center border-b border-[#d4af37]/20 pb-6">
                                    <h2 className="text-2xl font-black italic uppercase leading-none tracking-tighter">
                                        {adminUser === 'SIMONE' 
                                            ? (adminSubView === 'agenda' ? 'AGENDONE TEAM' : 'SETTAGGI SALONE') 
                                            : `AGENDA ${adminUser}`}
                                    </h2>
                                    <button onClick={()=>{setAdminUser(null); setView('booking');}} className="philia-gold text-xs font-bold uppercase border border-[#d4af37]/30 px-6 py-3 rounded-full">Indietro</button>
                                </div>
                                
                                {adminUser === 'SIMONE' ? (
                                    /* --- VISTA MASTER SIMONE --- */
                                    <div className="space-y-12">
                                        {/* SOTTO-PAGINA AGENDA */}
                                        {adminSubView === 'agenda' && (
                                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 fade-in">
                                                {barbers.map(barber => (
                                                    <div key={barber.id} className="philia-bg p-5 rounded-[30px] border border-white/5 shadow-xl">
                                                        <div className="flex justify-between items-center mb-6 border-b border-[#d4af37]/10 pb-3">
                                                            <h4 className="philia-gold font-black uppercase italic">{barber.name}</h4>
                                                        </div>
                                                        <div className="space-y-3">
                                                            {bookings.filter(b => b.barberId === barber.id).sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time)).map(b => (
                                                                <div key={b.id} className="bg-black/30 p-4 rounded-2xl border border-white/5 relative group">
                                                                    <div className="flex justify-between items-start">
                                                                        <p className="philia-gold font-black text-xs uppercase">{b.time} - {b.date}</p>
                                                                        <button onClick={async () => { if(confirm("Eliminare?")) await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('bookings').doc(b.id).delete(); }} className="text-red-500/20 group-hover:text-red-500 transition-colors">✕</button>
                                                                    </div>
                                                                    <p className="font-bold uppercase text-sm mt-1">{b.customerName}</p>
                                                                    <p className="text-green-500 text-[10px] font-black">{b.customerPhone}</p>
                                                                </div>
                                                            ))}
                                                            {bookings.filter(b => b.barberId === barber.id).length === 0 && <p className="text-center py-10 opacity-10 italic uppercase text-[10px]">Agenda Libera</p>}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {/* SOTTO-PAGINA GESTIONE SALONE */}
                                        {adminSubView === 'gestione' && (
                                            <div className="space-y-12 fade-in">
                                                {/* ECCEZIONI CALENDARIO */}
                                                <section className="max-w-4xl mx-auto space-y-6">
                                                    <div className="p-8 bg-[#d4af37]/5 border-2 border-dashed border-[#d4af37]/30 rounded-[40px]">
                                                        <h3 className="philia-gold font-black uppercase italic text-xl border-l-4 border-[#d4af37] pl-4 leading-none mb-4">Eccezioni Calendario</h3>
                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                                            <div className="philia-bg p-6 rounded-3xl border border-white/5 space-y-5">
                                                                <label className="text-[10px] font-black philia-gold uppercase tracking-widest block">1. Scegli Data</label>
                                                                <input type="date" value={newExc.date} onChange={(e)=>setNewExc({...newExc, date: e.target.value})} className="w-full bg-black/40 border border-white/10 p-4 rounded-xl font-bold text-white outline-none" />
                                                                <button onClick={()=>setNewExc({...newExc, open: !newExc.open})} className={`w-full p-4 rounded-xl font-black text-xs uppercase ${newExc.open ? 'bg-green-600 text-white' : 'bg-red-500/20 text-red-500'}`}>{newExc.open ? 'Disponibile (Imposta Sotto)' : 'Chiuso (Ferie/Festivo)'}</button>
                                                                {newExc.open && (
                                                                    <div className="space-y-4 pt-4 border-t border-white/5">
                                                                        <div className="grid grid-cols-2 gap-3">
                                                                            <div className="space-y-1"><label className="text-[8px] opacity-30 uppercase font-black">AM In</label><input type="time" value={newExc.am[0]} onChange={(e)=>setNewExc({...newExc, am:[e.target.value, newExc.am[1]]})} className="bg-black/40 p-3 rounded-lg text-xs w-full text-white" /></div>
                                                                            <div className="space-y-1"><label className="text-[8px] opacity-30 uppercase font-black">AM Out</label><input type="time" value={newExc.am[1]} onChange={(e)=>setNewExc({...newExc, am:[newExc.am[0], e.target.value]})} className="bg-black/40 p-3 rounded-lg text-xs w-full text-white" /></div>
                                                                        </div>
                                                                        <div className="grid grid-cols-2 gap-3">
                                                                            <div className="space-y-1"><label className="text-[8px] opacity-30 uppercase font-black">PM In</label><input type="time" value={newExc.pm[0]} onChange={(e)=>setNewExc({...newExc, pm:[e.target.value, newExc.pm[1]]})} className="bg-black/40 p-3 rounded-lg text-xs w-full text-white" /></div>
                                                                            <div className="space-y-1"><label className="text-[8px] opacity-30 uppercase font-black">PM Out</label><input type="time" value={newExc.pm[1]} onChange={(e)=>setNewExc({...newExc, pm:[newExc.pm[0], e.target.value]})} className="bg-black/40 p-3 rounded-lg text-xs w-full text-white" /></div>
                                                                        </div>
                                                                    </div>
                                                                )}
                                                                <button onClick={()=>addDateOverride(barbers.find(b => b.name === 'SIMONE').id)} className="w-full philia-btn p-5 rounded-2xl font-black text-xs uppercase shadow-xl mt-4">Eccezione Solo Simone</button>
                                                                <button onClick={()=>addDateOverride(null, true)} className="w-full bg-white/10 p-5 rounded-2xl font-black text-xs uppercase text-white hover:bg-white/20 mt-2">Eccezione Tutto Salone</button>
                                                            </div>
                                                            <div className="space-y-4">
                                                                <label className="text-[10px] font-black philia-gold uppercase tracking-widest block">Eccezioni Attive</label>
                                                                <div className="max-h-[350px] overflow-y-auto pr-2 space-y-3 no-scrollbar">
                                                                    {/* Eccezioni Salone */}
                                                                    {Object.entries(settings?.dateOverrides || {}).sort().map(([date, h]) => (
                                                                        <div key={date + "_global"} className="bg-[#d4af37]/10 p-5 rounded-2xl border border-[#d4af37]/30 flex justify-between items-center">
                                                                            <div><p className="font-black text-sm philia-gold">{date} (Tutti)</p><p className="text-[9px] uppercase">{h.open ? `AM ${h.am[0]}-${h.am[1]} PM ${h.pm[0]}-${h.pm[1]}` : 'Chiuso per tutti'}</p></div>
                                                                            <button onClick={()=>removeDateOverride(null, date, true)} className="text-red-500 font-black px-2">✕</button>
                                                                        </div>
                                                                    ))}
                                                                    {/* Eccezioni Personali Simone */}
                                                                    {Object.entries(barbers.find(b => b.name === 'SIMONE')?.dateOverrides || {}).sort().map(([date, h]) => (
                                                                        <div key={date} className="philia-bg p-5 rounded-2xl border border-white/5 flex justify-between items-center">
                                                                            <div><p className="font-black text-sm">{date} (Simone)</p><p className="text-[9px] uppercase">{h.open ? `AM ${h.am[0]}-${h.am[1]} PM ${h.pm[0]}-${h.pm[1]}` : 'Chiuso'}</p></div>
                                                                            <button onClick={()=>removeDateOverride(barbers.find(b => b.name === 'SIMONE').id, date)} className="text-red-500 font-black px-2">✕</button>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </section>

                                                {/* ORARI DEFAULT */}
                                                <section className="max-w-4xl mx-auto space-y-6">
                                                    <h3 className="philia-gold font-black uppercase italic text-xl border-l-4 border-white/20 pl-4 leading-none">Orari Default Salone</h3>
                                                    <div className="grid gap-4 opacity-70">
                                                        {settings && Object.keys(settings.openingHours).map(day => (
                                                            <div key={day} className="philia-bg p-5 rounded-[25px] border border-white/5 flex justify-between items-center">
                                                                <p className="font-black text-sm uppercase italic tracking-widest">{DAYS_NAME[day]}</p>
                                                                <button onClick={()=>updateSchedule(day, 'open', !settings.openingHours[day].open)} className={`text-[10px] font-black px-4 py-2 rounded-full ${settings.openingHours[day].open ? 'bg-green-600 text-white' : 'bg-red-500/20 text-red-500'}`}>{settings.openingHours[day].open ? 'APERTO' : 'CHIUSO'}</button>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </section>

                                                {/* GESTIONE TEAM */}
                                                <section className="max-w-4xl mx-auto space-y-6 pb-20">
                                                    <div className="flex justify-between items-center border-l-4 border-[#d4af37] pl-4">
                                                        <h3 className="philia-gold font-black uppercase italic text-xl leading-none">Team Philia</h3>
                                                        <button onClick={addNewBarber} className="philia-btn px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg hover:scale-105 transition-all">Aggiungi +</button>
                                                    </div>
                                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                                        {barbers.map(barber => (
                                                            <div key={barber.id} className="philia-bg p-6 rounded-3xl border border-white/5 relative">
                                                                {barber.name !== 'SIMONE' && <button onClick={()=>removeBarber(barber.id, barber.name)} className="absolute top-4 right-4 text-red-500/30">✕</button>}
                                                                <h4 className="text-center philia-gold font-black uppercase italic mb-6 border-b border-white/10 pb-3 leading-none">{barber.name}</h4>
                                                                <div className="space-y-2">
                                                                    {MASTER_SERVICES.map(s => {
                                                                        const isSelected = (barber.skills || []).includes(s.id);
                                                                        return (
                                                                            <button key={s.id} onClick={() => toggleSkill(barber.id, barber.skills || [], s.id)} className={`w-full text-left p-2 rounded-lg text-[10px] font-bold uppercase transition-all flex justify-between items-center ${isSelected ? 'bg-[#d4af37]/10 text-white' : 'opacity-20'}`}>
                                                                                {s.name}
                                                                                <div className={`w-3 h-3 rounded-full border border-white/20 ${isSelected ? 'bg-[#d4af37]' : 'bg-transparent'}`}></div>
                                                                            </button>
                                                                        );
                                                                    })}
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </section>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    /* --- VISTA COLLABORATORE STANDARD --- */
                                    <div className="space-y-12">
                                        <div className="space-y-4 max-w-2xl mx-auto">
                                            {bookings.filter(b => b.barberName === adminUser).sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time)).map(b => (
                                                <div key={b.id} className="philia-bg p-6 rounded-[30px] border border-white/5 shadow-xl">
                                                    <p className="philia-gold font-black italic text-xl">{b.time} - {b.date}</p>
                                                    <p className="font-bold uppercase text-xl leading-tight">{b.customerName}</p>
                                                    <p className="text-green-500 font-black tracking-widest">{b.customerPhone}</p>
                                                    <p className="text-white/30 text-[9px] uppercase font-bold mt-2">{b.serviceName}</p>
                                                </div>
                                            ))}
                                            {bookings.filter(b => b.barberName === adminUser).length === 0 && <p className="text-center py-20 opacity-20 italic">Nessun appuntamento</p>}
                                        </div>
                                        
                                        {/* ECCEZIONI PERSONALI COLLABORATORE */}
                                        <section className="max-w-4xl mx-auto space-y-6 pt-10 border-t border-white/5">
                                            <div className="p-8 bg-[#d4af37]/5 border-2 border-dashed border-[#d4af37]/30 rounded-[40px]">
                                                <h3 className="philia-gold font-black uppercase italic text-xl border-l-4 border-[#d4af37] pl-4 leading-none mb-4">Le Mie Disponibilità (Eccezioni)</h3>
                                                <div className="philia-bg p-6 rounded-3xl border border-white/5 space-y-5">
                                                    <input type="date" value={newExc.date} onChange={(e)=>setNewExc({...newExc, date: e.target.value})} className="w-full bg-black/40 border border-white/10 p-4 rounded-xl font-bold text-white outline-none" />
                                                    <button onClick={()=>setNewExc({...newExc, open: !newExc.open})} className={`w-full p-4 rounded-xl font-black text-xs uppercase ${newExc.open ? 'bg-green-600 text-white' : 'bg-red-500/20 text-red-500'}`}>{newExc.open ? 'Disponibile' : 'Chiuso (Ferie)'}</button>
                                                    {newExc.open && (
                                                        <div className="grid grid-cols-2 gap-3 mt-4">
                                                            <input type="time" value={newExc.am[0]} onChange={(e)=>setNewExc({...newExc, am:[e.target.value, newExc.am[1]]})} className="bg-black/40 p-3 rounded-lg text-xs w-full text-white" />
                                                            <input type="time" value={newExc.am[1]} onChange={(e)=>setNewExc({...newExc, am:[newExc.am[0], e.target.value]})} className="bg-black/40 p-3 rounded-lg text-xs w-full text-white" />
                                                        </div>
                                                    )}
                                                    <button onClick={()=>addDateOverride(barbers.find(b => b.name === adminUser).id)} className="w-full philia-btn p-5 rounded-2xl font-black text-xs uppercase shadow-xl mt-4">Salva Eccezione Personale</button>
                                                </div>
                                            </div>
                                        </section>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'my-bookings' && (
                            <div className="fade-in max-w-xl mx-auto">
                                <h2 className="text-2xl font-black mb-8 border-l-4 border-[#d4af37] pl-4 italic uppercase tracking-widest text-center sm:text-left tracking-tighter leading-none">I TUOI TAGLI</h2>
                                {bookings.filter(b => b.customerPhone === clientPhone).sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time)).map(b => (
                                    <div key={b.id} className="philia-bg p-8 rounded-[40px] border border-white/5 mb-5 shadow-2xl flex justify-between items-center transition-all hover:scale-[1.02]">
                                        <div>
                                            <p className="philia-gold font-black text-xs uppercase tracking-widest">{b.date}</p>
                                            <h3 className="font-black text-2xl uppercase italic leading-none my-1">{b.serviceName}</h3>
                                            <p className="text-white/40 text-[10px] uppercase font-bold">Con {b.barberName} • Philia</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-4xl font-black philia-gold italic leading-none">{b.time}</p>
                                            <button onClick={async ()=>{if(confirm("Vuoi annullare?")) await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('bookings').doc(b.id).delete();}} className="text-red-500/30 text-[9px] font-black uppercase mt-2 block w-full text-right underline italic">Annulla</button>
                                        </div>
                                    </div>
                                ))}
                                {bookings.filter(b => b.customerPhone === clientPhone).length === 0 && <p className="opacity-10 text-center py-20 uppercase font-black tracking-widest italic text-sm tracking-[4px]">Ancora nessun taglio</p>}
                            </div>
                        )}
                    </div>

                    {/* Navigazione Bottom */}
                    <div className="fixed bottom-0 left-0 right-0 philia-bg border-t border-[#d4af37]/10 p-5 flex justify-around items-center max-w-xl mx-auto z-50 rounded-t-[40px] shadow-[0_-20px_50px_rgba(0,0,0,0.5)]">
                        <button onClick={()=>{setView('booking'); setStep(1);}} className={`flex flex-col items-center transition-all ${view === 'booking' ? 'philia-gold scale-125' : 'text-white/20'}`}>
                            <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            <span className="text-[8px] font-black mt-1 uppercase tracking-widest">PRENOTA</span>
                        </button>
                        <button onClick={()=>setView('my-bookings')} className={`flex flex-col items-center transition-all ${view === 'my-bookings' ? 'philia-gold scale-125' : 'text-white/20'}`}>
                            <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                            <span className="text-[8px] font-black mt-1 uppercase tracking-widest text-center">MIEI TAGLI</span>
                        </button>
                        <button onClick={() => { if(confirm("Vuoi cambiare utente?")) { localStorage.clear(); location.reload(); }}} className="flex flex-col items-center text-white/10 hover:text-red-500">
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                            <span className="text-[7px] uppercase font-bold mt-1 text-center leading-none tracking-tighter">CAMBIA<br/>UTENTE</span>
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
