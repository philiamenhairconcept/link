<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prenota Philia</title>
    <style>
        /* Sfondo identico al logo per eliminare lo stacco */
        body, html { 
            background-color: #332d2d; 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            overflow: hidden; /* Evita la doppia barra di scorrimento */
            display: flex;
            flex-direction: column;
        }
        
        .header {
            padding: 15px;
            text-align: center;
            background-color: #332d2d;
        }

        .logo { 
            max-width: 130px; 
            height: auto; 
        }

        /* Il contenitore del calendario occupa tutto lo spazio restante */
        .cal-frame-container {
            flex-grow: 1;
            width: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.png" alt="Philia Logo" class="logo" onerror="this.style.display='none'">
    </div>
    
    <div class="cal-frame-container">
        <iframe 
            src="https://cal.com/smil3y-wkidff?theme=dark&embed=true" 
            allow="geolocation; microphone; camera; calendar; ship-pay">
        </iframe>
    </div>

    <script>
        // Ascoltiamo il messaggio di Cal.com per capire quando la prenotazione è conclusa
        window.addEventListener("message", function(e) {
            // Cal.com invia messaggi per vari eventi, noi cerchiamo la conferma
            if (e.data.action === "bookingSuccessful") {
                console.log("Prenotazione completata con successo!");
                setTimeout(() => {
                    // Reindirizziamo l'utente alla tua pagina ponte (index.html)
                    window.location.href = "index.html";
                }, 2000);
            }
        });
    </script>
</body>
</html>
