<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philia - Men Hair Concept</title>
    <!-- Librerie React e Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #1a1a1a; margin: 0; color: white; }
        .philia-bg { background-color: #332d2d; }
        .philia-gold { color: #d4af37; }
        .philia-btn { background-color: #d4af37; color: #332d2d; }
        .philia-border { border-color: #d4af37; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Ottimizzazione per PC */
        @media (min-width: 768px) {
            .app-container { max-width: 800px; margin: 2rem auto; border-radius: 24px; border: 1px solid rgba(212, 175, 55, 0.2); height: auto; min-height: 80vh; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONFIGURAZIONE FIREBASE PERSONALIZZATA PHILIA ---
        const firebaseConfig = {
            apiKey: "AIzaSyCvNKLOIqAz9ygOJ1Cpl4V94xm3VeKhqow",
            authDomain: "philia-men-hair-concept.firebaseapp.com",
            projectId: "philia-men-hair-concept",
            storageBucket: "philia-men-hair-concept.firebasestorage.app",
            messagingSenderId: "470631594940",
            appId: "1:470631594940:web:a259b8ce4a08fc2a0d49b9",
            measurementId: "G-X5V5J1JJC1"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = "philia-v2-production";

        const MASTER_SERVICES = [
            { id: 'perm_ricci', name: 'Permanente Ricci', price: 30, duration: 60 },
            { id: 'comp_scrub', name: 'Completo + Scrub Viso', price: 30, duration: 45 },
            { id: 'stira_bras', name: 'Stiratura Brasiliana', price: 30, duration: 60 },
            { id: 'comp_tinta', name: 'Completo + Tinta', price: 27, duration: 45 },
            { id: 'schia_cap', name: 'Schiaritura Capelli', price: 20, duration: 60 },
            { id: 'stira_chim', name: 'Stiratura Chimica', price: 20, duration: 60 },
            { id: 'tratt_ker', name: 'Trattamento Keratina', price: 20, duration: 30 },
            { id: 'tratt_crespo', name: 'Trattamento Disciplinare Crespo', price: 20, duration: 30 },
            { id: 'completo', name: 'Completo', price: 20, duration: 30 },
            { id: 'taglio_shamp', name: 'Taglio + Shampoo', price: 15, duration: 30 },
            { id: 'taglio_barba', name: 'Taglio + Barba', price: 15, duration: 45 },
            { id: 'ras_scrub', name: 'Rasatura Barba + Scrub Viso', price: 15, duration: 30 },
            { id: 'taglio_bimbo_sh', name: 'Taglio Bimbo + Shampoo', price: 13, duration: 30 },
            { id: 'ras_tinta_barba', name: 'Rasatura + Tinta Barba', price: 12, duration: 15 },
            { id: 'taglio_uomo', name: 'Taglio Uomo', price: 10, duration: 30 },
            { id: 'barba_shamp', name: 'Barba + Shampoo', price: 10, duration: 30 },
            { id: 'taglio_bambino', name: 'Taglio Bambino', price: 8, duration: 30 },
            { id: 'barba_panno', name: 'Barba Panno Caldo', price: 8, duration: 30 },
            { id: 'shampoo', name: 'Shampoo', price: 5, duration: 15 },
            { id: 'rasatura_barba', name: 'Rasatura Barba', price: 5, duration: 15 }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('booking'); 
            const [step, setStep] = useState(1);
            const [barbers, setBarbers] = useState([]);
            const [bookings, setBookings] = useState([]);
            
            // Dati Prenotazione
            const [selectedBarber, setSelectedBarber] = useState(null);
            const [selectedService, setSelectedService] = useState(null);
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [selectedSlot, setSelectedSlot] = useState(null);
            const [customerData, setCustomerData] = useState({ name: '', phone: '' });

            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubAuth = auth.onAuthStateChanged(async (u) => {
                    if (!u) {
                        try { await auth.signInAnonymously(); } catch(e) {}
                    }
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                const basePath = db.collection('artifacts').doc(appId).collection('public').doc('data');

                const unsubBarbers = basePath.collection('barbers').onSnapshot(snap => {
                    let data = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    if (data.length === 0) {
                        const initial = [
                            { name: 'SIMONE', skills: MASTER_SERVICES.map(s => s.id), order: 1 },
                            { name: 'ALESSANDRO', skills: MASTER_SERVICES.map(s => s.id), order: 2 },
                            { name: 'CATELLO', skills: MASTER_SERVICES.map(s => s.id), order: 3 }
                        ];
                        initial.forEach(b => basePath.collection('barbers').add(b));
                    }
                    setBarbers(data.sort((a,b) => a.order - b.order));
                });

                const unsubBookings = basePath.collection('bookings').onSnapshot(snap => {
                    setBookings(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });

                return () => { unsubBarbers(); unsubBookings(); };
            }, [user]);

            const handleConfirm = async () => {
                if (!customerData.name || !customerData.phone) {
                    alert("Per favore, inserisci nome e cellulare per completare la prenotazione.");
                    return;
                }
                
                const booking = {
                    userId: user.uid,
                    customerName: customerData.name,
                    customerPhone: customerData.phone,
                    barberId: selectedBarber.id,
                    barberName: selectedBarber.name,
                    serviceId: selectedService.id,
                    serviceName: selectedService.name,
                    price: selectedService.price,
                    date: selectedDate,
                    time: selectedSlot,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                };

                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('bookings').add(booking);
                alert("✂️ Prenotazione Confermata! Ti aspettiamo, " + customerData.name + ".");
                setView('my-bookings');
                setStep(1);
                setCustomerData({ name: '', phone: '' });
                setSelectedSlot(null);
            };

            const getFreeSlots = () => {
                const slots = ["09:00", "09:30", "10:00", "10:30", "11:00", "11:30", "12:00", "12:30", "13:00", "16:00", "16:30", "17:00", "17:30", "18:00", "18:30", "19:00", "19:30"];
                const occupied = bookings
                    .filter(b => b.date === selectedDate && b.barberId === selectedBarber.id)
                    .map(b => b.time);
                return slots.filter(s => !occupied.includes(s));
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-[#1a1a1a] text-[#d4af37] font-bold tracking-[5px]">PHILIA</div>;

            return (
                <div className="app-container min-h-screen pb-24 shadow-2xl relative bg-[#1a1a1a] flex flex-col overflow-hidden">
                    {/* Header con Logo */}
                    <div className="p-6 philia-bg border-b border-[#d4af37]/20 flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-4">
                            <img src="logo.png" alt="Philia Logo" className="h-10 w-auto" onError={(e) => e.target.style.display='none'} />
                            <div className="hidden sm:block">
                                <h1 className="text-xl font-black philia-gold tracking-tighter uppercase italic leading-none">Philia</h1>
                                <p className="text-[8px] text-white/40 tracking-[3px] uppercase">Men Hair Concept</p>
                            </div>
                        </div>
                        <div className="flex gap-4">
                            <button onClick={() => setView('admin')} className="text-white/20 hover:text-[#d4af37] transition-colors">
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-6 md:p-10 no-scrollbar">
                        {view === 'booking' && (
                            <div className="fade-in max-w-xl mx-auto">
                                {step === 1 && (
                                    <>
                                        <h2 className="text-2xl font-black mb-8 philia-gold uppercase italic tracking-tighter text-center">Prenota il tuo stile</h2>
                                        <div className="grid grid-cols-1 gap-4">
                                            {barbers.map(b => (
                                                <button key={b.id} onClick={()=>{setSelectedBarber(b); setStep(2);}} className="w-full philia-bg p-6 rounded-2xl border-2 border-white/5 hover:border-[#d4af37] flex items-center justify-center group active:scale-[0.98] transition-all">
                                                    <span className="text-2xl font-black tracking-widest group-hover:philia-gold transition-colors">{b.name}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </>
                                )}
                                {step === 2 && (
                                    <>
                                        <button onClick={()=>setStep(1)} className="philia-gold text-[10px] font-black mb-6 uppercase tracking-widest flex items-center gap-2">← CAMBIA BARBIERE</button>
                                        <h2 className="text-xl font-bold mb-8 border-l-4 border-[#d4af37] pl-4 uppercase">Servizi di {selectedBarber.name}</h2>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                            {MASTER_SERVICES.filter(s => selectedBarber.skills.includes(s.id)).map(s => (
                                                <button key={s.id} onClick={()=>{setSelectedService(s); setStep(3);}} className="w-full philia-bg p-5 rounded-2xl border border-white/5 flex justify-between items-center text-left hover:border-[#d4af37] transition-all">
                                                    <div className="pr-4">
                                                        <p className="font-bold text-base leading-tight mb-1">{s.name}</p>
                                                        <p className="text-[10px] text-white/30 uppercase font-bold">{s.duration} MINUTI</p>
                                                    </div>
                                                    <p className="philia-gold font-black text-xl">€{s.price}</p>
                                                </button>
                                            ))}
                                        </div>
                                    </>
                                )}
                                {step === 3 && (
                                    <>
                                        <button onClick={()=>setStep(2)} className="philia-gold text-[10px] font-black mb-6 uppercase tracking-widest flex items-center gap-2">← CAMBIA SERVIZIO</button>
                                        <h2 className="text-xl font-bold mb-8 border-l-4 border-[#d4af37] pl-4 uppercase">Scegli Data e Ora</h2>
                                        <div className="bg-[#332d2d] p-6 rounded-3xl mb-8 border border-white/5">
                                            <input type="date" value={selectedDate} min={new Date().toISOString().split('T')[0]} onChange={(e)=>setSelectedDate(e.target.value)} className="w-full bg-transparent text-white font-bold text-xl text-center focus:outline-none" />
                                        </div>
                                        
                                        <div className="grid grid-cols-3 sm:grid-cols-4 gap-3">
                                            {getFreeSlots().map(slot => (
                                                <button key={slot} onClick={()=>{setSelectedSlot(slot); setStep(4);}} className={`p-4 rounded-xl font-black text-sm transition-all ${selectedSlot === slot ? 'philia-btn scale-105' : 'bg-[#332d2d] border border-white/5 hover:border-[#d4af37]/50'}`}>{slot}</button>
                                            ))}
                                        </div>
                                    </>
                                )}
                                {step === 4 && (
                                    <div className="fade-in max-w-md mx-auto">
                                        <button onClick={()=>setStep(3)} className="philia-gold text-[10px] font-black mb-6 uppercase tracking-widest flex items-center gap-2">← CAMBIA ORARIO</button>
                                        <h2 className="text-xl font-bold mb-8 border-l-4 border-[#d4af37] pl-4 uppercase">I Tuoi Dati</h2>
                                        <div className="space-y-4">
                                            <div className="bg-[#332d2d] p-4 rounded-2xl border border-white/5">
                                                <label className="text-[9px] philia-gold font-bold uppercase tracking-widest block mb-1">Nome e Cognome</label>
                                                <input type="text" value={customerData.name} onChange={(e)=>setCustomerData({...customerData, name: e.target.value})} placeholder="Esempio: Mario Rossi" className="bg-transparent w-full text-white font-bold outline-none" />
                                            </div>
                                            <div className="bg-[#332d2d] p-4 rounded-2xl border border-white/5">
                                                <label className="text-[9px] philia-gold font-bold uppercase tracking-widest block mb-1">Cellulare</label>
                                                <input type="tel" value={customerData.phone} onChange={(e)=>setCustomerData({...customerData, phone: e.target.value})} placeholder="333 000 0000" className="bg-transparent w-full text-white font-bold outline-none" />
                                            </div>
                                            
                                            <div className="p-6 bg-[#d4af37]/5 border-2 border-dashed border-[#d4af37]/20 rounded-3xl mt-8">
                                                <p className="text-[10px] philia-gold font-black uppercase text-center mb-2 tracking-[3px]">Riepilogo</p>
                                                <p className="text-center font-bold text-lg">{selectedService.name}</p>
                                                <p className="text-center text-white/50">{selectedBarber.name} • {selectedDate} • {selectedSlot}</p>
                                            </div>

                                            <button onClick={handleConfirm} className="w-full mt-6 philia-btn p-6 rounded-2xl font-black text-xl uppercase tracking-tighter shadow-2xl active:scale-95 transition-all">CONFERMA E PRENOTA</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'my-bookings' && (
                            <div className="fade-in max-w-xl mx-auto">
                                <h2 className="text-2xl font-black mb-8 border-l-4 border-[#d4af37] pl-4 italic uppercase italic">I Miei Appuntamenti</h2>
                                {bookings.filter(b => b.userId === user?.uid).length === 0 ? (
                                    <div className="text-center p-12 philia-bg rounded-3xl opacity-30">
                                        <p className="text-sm font-bold uppercase tracking-widest">Nessun appuntamento attivo</p>
                                    </div>
                                ) : (
                                    bookings.filter(b => b.userId === user?.uid).map(b => (
                                        <div key={b.id} className="philia-bg p-6 rounded-3xl border border-white/5 mb-5 shadow-2xl">
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <p className="philia-gold text-[10px] font-black uppercase tracking-widest mb-1">{b.date}</p>
                                                    <h3 className="font-bold text-xl leading-tight">{b.serviceName}</h3>
                                                    <p className="text-white/40 text-[10px] uppercase font-bold mt-2">Specialista: {b.barberName}</p>
                                                </div>
                                                <div className="text-right">
                                                    <p className="text-3xl font-black philia-gold leading-none">{b.time}</p>
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {view === 'admin' && (
                            <div className="fade-in max-w-4xl mx-auto">
                                <div className="flex items-center justify-between mb-8">
                                    <h2 className="text-2xl font-black italic uppercase">Gestione Salone</h2>
                                    <button onClick={()=>setView('booking')} className="philia-gold text-[10px] font-black uppercase tracking-widest">Chiudi</button>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {barbers.map(barber => (
                                        <div key={barber.id} className="philia-bg p-6 rounded-3xl border border-white/5 shadow-xl">
                                            <h3 className="philia-gold font-black text-xl mb-6 border-b border-white/10 pb-3 uppercase italic text-center">{barber.name}</h3>
                                            <div className="space-y-3">
                                                {MASTER_SERVICES.map(s => {
                                                    const hasSkill = barber.skills.includes(s.id);
                                                    return (
                                                        <div key={s.id} className="flex justify-between items-center group">
                                                            <span className={`text-[10px] font-bold transition-opacity ${hasSkill ? 'text-white' : 'text-white/20'}`}>{s.name}</span>
                                                            <button 
                                                                onClick={async () => {
                                                                    const newSkills = hasSkill ? barber.skills.filter(id => id !== s.id) : [...barber.skills, s.id];
                                                                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('barbers').doc(barber.id).update({skills: newSkills});
                                                                }}
                                                                className={`w-8 h-4 rounded-full relative transition-colors ${hasSkill ? 'bg-[#d4af37]' : 'bg-white/10'}`}
                                                            >
                                                                <div className={`absolute top-0.5 w-3 h-3 bg-white rounded-full transition-all ${hasSkill ? 'right-0.5' : 'left-0.5'}`}></div>
                                                            </button>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Navigazione Inferiore */}
                    <div className="fixed bottom-0 left-0 right-0 philia-bg border-t border-[#d4af37]/10 p-5 flex justify-around items-center max-w-xl mx-auto z-50 rounded-t-3xl shadow-[0_-10px_30px_rgba(0,0,0,0.5)] md:mb-4 md:rounded-3xl">
                        <button onClick={()=>{setView('booking'); setStep(1);}} className={`flex flex-col items-center transition-all ${view === 'booking' ? 'philia-gold' : 'text-white/30'}`}>
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            <span className="text-[9px] font-black mt-1 uppercase tracking-widest">Prenota</span>
                        </button>
                        <button onClick={()=>setView('my-bookings')} className={`flex flex-col items-center transition-all ${view === 'my-bookings' ? 'philia-gold' : 'text-white/30'}`}>
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                            <span className="text-[9px] font-black mt-1 uppercase tracking-widest">Miei Tagli</span>
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
