<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prenota Philia</title>
    <style>
        body { background-color: #332d2d; color: #d4af37; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .logo { max-width: 150px; margin-bottom: 20px; }
        /* Stile per il calendario */
        #my-cal { width: 100%; height: 700px; border: none; }
    </style>
</head>
<body>
    <img src="logo.png" alt="Philia Logo" class="logo">
    
    <div id="my-cal"></div>

    <script>
      (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; let d = C.document; C.Cal = C.Cal || function () { let a = C.Cal; if (!a.q) { a.q = []; } p(a, arguments); }; }(window, "https://app.cal.com/embed/embed.js", "Cal"));
      
      Cal("init", {origin: "https://app.cal.com"});

      // Configura il calendario
      Cal("inline", {
        elementOrSelector: "#my-cal",
        calLink: "IL_TUO_LINK_CAL_COM", // Esempio: simone-philia/taglio
        config: {"theme":"dark"}
      });

      // IL TRUCCO: Ascolta quando la prenotazione è finita
      Cal("on", {
        action: "bookingSuccessfulV2",
        callback: (e) => {
          const data = e.detail.data.booking;
          // Costruisce il link con i dettagli per l'app
          const bridgeUrl = `index.html?date=${data.startTime}&name=${data.attendees[0].name}`;
          
          // Aspetta 2 secondi per far vedere la conferma e poi scatta il redirect!
          setTimeout(() => {
            window.location.href = bridgeUrl;
          }, 2000);
        }
      });
    </script>
</body>
</html>
