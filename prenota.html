<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prenota Philia</title>
    <style>
        body { 
            background-color: #332d2d; 
            margin: 0; 
            padding: 0; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
        }
        .header {
            padding: 15px;
            text-align: center;
        }
        .logo { 
            max-width: 120px; 
            height: auto; 
        }
        /* Il "motore" del calendario */
        .cal-container {
            flex-grow: 1; /* Prende tutto lo spazio rimasto */
            width: 100%;
            border: none;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.png" alt="Philia Logo" class="logo" onerror="this.style.display='none'">
    </div>
    
    <div class="cal-container">
        <iframe 
            src="https://cal.com/smil3y-wkidff?theme=dark&embed=true" 
            id="cal-frame">
        </iframe>
    </div>

    <script>
        // Restiamo in ascolto per capire quando il cliente ha finito di prenotare
        window.addEventListener("message", function(e) {
            // Cal.com invia un messaggio quando la prenotazione ha successo
            if (e.data.origin === "Cal" && (e.data.action === "bookingSuccessful" || e.data.action === "successfulBooking")) {
                console.log("Prenotazione riuscita!");
                setTimeout(() => {
                    // Reindirizziamo alla tua pagina ponte index.html
                    window.location.href = "index.html";
                }, 2000);
            }
        });
    </script>
</body>
</html>
