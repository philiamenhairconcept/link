<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philia - Men Hair Concept</title>
    <!-- Librerie React e Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK Compat (Legacy) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #1a1a1a; margin: 0; color: white; overflow-x: hidden; }
        .philia-bg { background-color: #332d2d; }
        .philia-gold { color: #d4af37; }
        .philia-btn { background-color: #d4af37; color: #332d2d; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONFIGURAZIONE FIREBASE PERSONALIZZATA PHILIA ---
        const firebaseConfig = {
            apiKey: "AIzaSyCvNKLOIqAz9ygOJ1Cpl4V94xm3VeKhqow",
            authDomain: "philia-men-hair-concept.firebaseapp.com",
            projectId: "philia-men-hair-concept",
            storageBucket: "philia-men-hair-concept.firebasestorage.app",
            messagingSenderId: "470631594940",
            appId: "1:470631594940:web:a259b8ce4a08fc2a0d49b9",
            measurementId: "G-X5V5J1JJC1"
        };

        // Inizializzazione Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = "philia-v2-production";

        // --- CATALOGO SERVIZI ---
        const MASTER_SERVICES = [
            { id: 'perm_ricci', name: 'Permanente Ricci', price: 30, duration: 60, desc: 'Il prezzo varia in base alla lunghezza dei capelli.' },
            { id: 'comp_scrub', name: 'Completo + Scrub Viso', price: 30, duration: 45, desc: 'Taglio, barba, shampoo e trattamento scrub.' },
            { id: 'stira_bras', name: 'Stiratura Brasiliana', price: 30, duration: 60, desc: 'Trattamento lisciante alla keratina.' },
            { id: 'comp_tinta', name: 'Completo + Tinta', price: 27, duration: 45, desc: 'Servizio completo con tinta capelli.' },
            { id: 'schia_cap', name: 'Schiaritura Capelli', price: 20, duration: 60, desc: 'Schiaritura professionale personalizzata.' },
            { id: 'stira_chim', name: 'Stiratura Chimica', price: 20, duration: 60, desc: 'Trattamento stirante chimico.' },
            { id: 'tratt_ker', name: 'Trattamento Keratina', price: 20, duration: 30, desc: 'Ricostruzione profonda del capello.' },
            { id: 'tratt_crespo', name: 'Trattamento Disciplinare Crespo', price: 20, duration: 30, desc: 'Elimina l\'effetto crespo.' },
            { id: 'completo', name: 'Completo', price: 20, duration: 30, desc: 'Taglio, Barba e Shampoo.' },
            { id: 'taglio_shamp', name: 'Taglio + Shampoo', price: 15, duration: 30, desc: 'Taglio capelli e lavaggio.' },
            { id: 'taglio_barba', name: 'Taglio + Barba', price: 15, duration: 45, desc: 'Taglio capelli e modellatura barba.' },
            { id: 'ras_scrub', name: 'Rasatura Barba + Scrub Viso', price: 15, duration: 30, desc: 'Rasatura e pulizia viso.' },
            { id: 'taglio_bimbo_sh', name: 'Taglio Bimbo + Shampoo', price: 13, duration: 30, desc: 'Per i piccoli clienti Philia.' },
            { id: 'ras_tinta_barba', name: 'Rasatura + Tinta Barba', price: 12, duration: 15, desc: 'Rifinitura e colore barba.' },
            { id: 'taglio_uomo', name: 'Taglio Uomo', price: 10, duration: 30, desc: 'Taglio capelli classico o moderno.' },
            { id: 'barba_shamp', name: 'Barba + Shampoo', price: 10, duration: 30, desc: 'Trattamento barba e lavaggio.' },
            { id: 'taglio_bambino', name: 'Taglio Bambino', price: 8, duration: 30, desc: 'Solo taglio per bambini.' },
            { id: 'barba_panno', name: 'Barba Panno Caldo', price: 8, duration: 30, desc: 'Esperienza relax panno caldo.' },
            { id: 'shampoo', name: 'Shampoo', price: 5, duration: 15, desc: 'Lavaggio professionale Philia.' },
            { id: 'rasatura_barba', name: 'Rasatura Barba', price: 5, duration: 15, desc: 'Solo rasatura rapida.' }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('booking'); 
            const [step, setStep] = useState(1);
            const [barbers, setBarbers] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [selectedBarber, setSelectedBarber] = useState(null);
            const [selectedService, setSelectedService] = useState(null);
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [selectedSlot, setSelectedSlot] = useState(null);
            const [loading, setLoading] = useState(true);

            // Inizializzazione Auth
            useEffect(() => {
                const unsubAuth = auth.onAuthStateChanged(async (u) => {
                    if (!u) {
                        try { await auth.signInAnonymously(); } catch(e) { console.error("Errore Auth:", e); }
                    }
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubAuth();
            }, []);

            // Caricamento Dati Real-time
            useEffect(() => {
                if (!user) return;
                
                const basePath = db.collection('artifacts').doc(appId).collection('public').doc('data');

                // Listener Collaboratori
                const unsubBarbers = basePath.collection('barbers').onSnapshot(snap => {
                    let data = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    if (data.length === 0) {
                        const initial = [
                            { name: 'Simone', skills: MASTER_SERVICES.map(s => s.id), order: 1 },
                            { name: 'Alessandro', skills: MASTER_SERVICES.map(s => s.id), order: 2 },
                            { name: 'Catello', skills: MASTER_SERVICES.map(s => s.id), order: 3 }
                        ];
                        initial.forEach(b => basePath.collection('barbers').add(b));
                    }
                    setBarbers(data.sort((a,b) => a.order - b.order));
                });

                // Listener Prenotazioni
                const unsubBookings = basePath.collection('bookings').onSnapshot(snap => {
                    setBookings(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });

                return () => { unsubBarbers(); unsubBookings(); };
            }, [user]);

            const handleConfirm = async () => {
                if (!selectedSlot) return;
                const booking = {
                    userId: user.uid,
                    barberId: selectedBarber.id,
                    barberName: selectedBarber.name,
                    serviceId: selectedService.id,
                    serviceName: selectedService.name,
                    price: selectedService.price,
                    date: selectedDate,
                    time: selectedSlot,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                };

                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('bookings').add(booking);
                alert("✂️ Prenotazione Confermata! Ti aspettiamo in salone.");
                setView('my-bookings');
                setStep(1);
            };

            const cancelBooking = async (id, date, time) => {
                const now = new Date();
                const [h, m] = time.split(':');
                const bDate = new Date(date);
                bDate.setHours(parseInt(h), parseInt(m));
                
                if ((bDate - now) / (1000 * 60 * 60) < 2) {
                    alert("⚠️ Spiacenti, mancano meno di 2 ore. Per annullare chiama il salone.");
                    return;
                }
                
                if(confirm("Vuoi davvero annullare questo appuntamento?")) {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('bookings').doc(id).delete();
                }
            };

            const getFreeSlots = () => {
                const slots = ["09:00", "09:30", "10:00", "10:30", "11:00", "11:30", "12:00", "12:30", "13:00", "16:00", "16:30", "17:00", "17:30", "18:00", "18:30", "19:00", "19:30", "20:00"];
                const occupied = bookings
                    .filter(b => b.date === selectedDate && b.barberId === selectedBarber.id)
                    .map(b => b.time);
                return slots.filter(s => !occupied.includes(s));
            };

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-[#1a1a1a]">
                    <div className="text-center">
                        <div className="w-12 h-12 border-4 border-[#d4af37] border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                        <p className="philia-gold font-bold uppercase tracking-widest text-xs">Philia Concept...</p>
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen pb-24 shadow-2xl relative bg-[#1a1a1a] flex flex-col">
                    {/* Header */}
                    <div className="p-6 philia-bg border-b border-[#d4af37]/20 flex justify-between items-center sticky top-0 z-50">
                        <div>
                            <h1 className="text-2xl font-black philia-gold tracking-tighter uppercase italic leading-none">Philia</h1>
                            <p className="text-[10px] text-white/40 tracking-[4px] uppercase mt-1">Men Hair Concept</p>
                        </div>
                        <button onClick={() => setView('admin')} className="p-2 text-white/20 hover:text-[#d4af37] transition-colors">
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                        </button>
                    </div>

                    <div className="flex-1 overflow-y-auto p-6 no-scrollbar">
                        {view === 'booking' && (
                            <div className="fade-in">
                                {step === 1 && (
                                    <>
                                        <h2 className="text-xl font-bold mb-6 border-l-4 border-[#d4af37] pl-4 uppercase">Chi ti servirà?</h2>
                                        {barbers.map(b => (
                                            <button key={b.id} onClick={()=>{setSelectedBarber(b); setStep(2);}} className="w-full mb-4 philia-bg p-5 rounded-2xl border border-white/5 flex items-center justify-between group active:scale-[0.98] transition-all">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-14 h-14 bg-black rounded-full flex items-center justify-center border border-[#d4af37]/30 philia-gold font-black text-xl">{b.name[0]}</div>
                                                    <div className="text-left">
                                                        <span className="text-xl font-black block group-hover:philia-gold transition-colors">{b.name}</span>
                                                        <span className="text-[10px] text-white/30 uppercase font-bold tracking-widest">Disponibile</span>
                                                    </div>
                                                </div>
                                                <span className="philia-gold text-2xl opacity-50">→</span>
                                            </button>
                                        ))}
                                    </>
                                )}
                                {step === 2 && (
                                    <>
                                        <button onClick={()=>setStep(1)} className="philia-gold text-[10px] font-black mb-6 uppercase tracking-widest flex items-center gap-2">
                                            <span>←</span> TORNA AI COLLABORATORI
                                        </button>
                                        <h2 className="text-xl font-bold mb-6 border-l-4 border-[#d4af37] pl-4 uppercase italic">Servizi di {selectedBarber.name}</h2>
                                        <div className="space-y-3">
                                            {MASTER_SERVICES.filter(s => selectedBarber.skills.includes(s.id)).map(s => (
                                                <button key={s.id} onClick={()=>{setSelectedService(s); setStep(3);}} className="w-full philia-bg p-5 rounded-2xl border border-white/5 flex justify-between items-center text-left active:border-[#d4af37] transition-all">
                                                    <div>
                                                        <p className="font-bold text-base leading-none mb-1">{s.name}</p>
                                                        <p className="text-[10px] text-white/30 uppercase font-black">{s.duration} MINUTI</p>
                                                    </div>
                                                    <p className="philia-gold font-black text-xl">€{s.price}</p>
                                                </button>
                                            ))}
                                        </div>
                                    </>
                                )}
                                {step === 3 && (
                                    <>
                                        <button onClick={()=>setStep(2)} className="philia-gold text-[10px] font-black mb-6 uppercase tracking-widest flex items-center gap-2">
                                            <span>←</span> CAMBIA SERVIZIO
                                        </button>
                                        <h2 className="text-xl font-bold mb-6 border-l-4 border-[#d4af37] pl-4 uppercase italic">Data e Ora</h2>
                                        <input type="date" value={selectedDate} min={new Date().toISOString().split('T')[0]} onChange={(e)=>setSelectedDate(e.target.value)} className="w-full bg-[#332d2d] border border-[#d4af37]/30 p-5 rounded-2xl text-white font-bold mb-8 focus:outline-none focus:border-[#d4af37]" />
                                        
                                        <div className="grid grid-cols-3 gap-3">
                                            {getFreeSlots().map(slot => (
                                                <button key={slot} onClick={()=>setSelectedSlot(slot)} className={`p-4 rounded-xl font-black text-sm transition-all ${selectedSlot === slot ? 'philia-btn scale-105 shadow-xl shadow-[#d4af37]/20' : 'bg-[#332d2d] border border-white/5 text-white'}`}>{slot}</button>
                                            ))}
                                        </div>
                                        {selectedSlot && (
                                            <button onClick={handleConfirm} className="w-full mt-12 philia-btn p-6 rounded-2xl font-black text-xl uppercase tracking-tighter shadow-2xl active:scale-95 transition-all">Conferma Appuntamento</button>
                                        )}
                                    </>
                                )}
                            </div>
                        )}

                        {view === 'my-bookings' && (
                            <div className="fade-in">
                                <h2 className="text-2xl font-black mb-8 border-l-4 border-[#d4af37] pl-4 italic uppercase tracking-tighter">I Miei Appuntamenti</h2>
                                {bookings.filter(b => b.userId === user?.uid).length === 0 ? (
                                    <div className="text-center p-12 philia-bg rounded-3xl opacity-30 border border-dashed border-white/10">
                                        <p className="text-sm font-bold uppercase tracking-widest">Nessuna prenotazione</p>
                                    </div>
                                ) : (
                                    bookings.filter(b => b.userId === user?.uid).map(b => {
                                        const bFullDate = new Date(b.date + 'T' + b.time);
                                        const now = new Date();
                                        const canCancel = (bFullDate - now) / (1000 * 60 * 60) >= 2;
                                        
                                        return (
                                            <div key={b.id} className="philia-bg p-6 rounded-3xl border border-white/5 mb-5 shadow-2xl relative overflow-hidden">
                                                <div className="flex justify-between items-start">
                                                    <div>
                                                        <p className="philia-gold text-[10px] font-black uppercase tracking-widest mb-1">{b.date}</p>
                                                        <h3 className="font-bold text-xl leading-tight">{b.serviceName}</h3>
                                                        <p className="text-white/40 text-[10px] uppercase font-black mt-2">Specialista: {b.barberName}</p>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="text-3xl font-black philia-gold leading-none">{b.time}</p>
                                                        <p className="text-[9px] text-green-500 font-black uppercase mt-1">Confermato</p>
                                                    </div>
                                                </div>
                                                <div className="pt-4 border-t border-white/5 mt-4 flex justify-between items-center">
                                                    <span className="text-[9px] text-white/20 uppercase font-black tracking-widest">Philia System v2.1</span>
                                                    {canCancel ? (
                                                        <button onClick={()=>cancelBooking(b.id, b.date, b.time)} className="text-red-500 text-[10px] font-black uppercase tracking-widest hover:underline">Annulla</button>
                                                    ) : (
                                                        <span className="text-white/20 text-[9px] italic uppercase">Bloccato (-2h)</span>
                                                    )}
                                                </div>
                                            </div>
                                        )
                                    })
                                )}
                            </div>
                        )}

                        {view === 'admin' && (
                            <div className="fade-in">
                                <div className="flex items-center justify-between mb-8">
                                    <h2 className="text-2xl font-black italic uppercase">Gestione Salone</h2>
                                    <button onClick={()=>setView('booking')} className="philia-gold text-[10px] font-black uppercase tracking-widest">Chiudi</button>
                                </div>
                                
                                {barbers.map(barber => (
                                    <div key={barber.id} className="philia-bg p-6 rounded-3xl mb-6 border border-white/5 shadow-xl">
                                        <div className="flex justify-between items-center mb-6 border-b border-white/10 pb-3">
                                            <h3 className="philia-gold font-black text-xl uppercase italic">{barber.name}</h3>
                                            <span className="text-[9px] bg-green-500/20 text-green-500 px-2 py-1 rounded font-black uppercase">Staff Online</span>
                                        </div>
                                        <div className="space-y-4">
                                            {MASTER_SERVICES.map(s => {
                                                const hasSkill = barber.skills.includes(s.id);
                                                return (
                                                    <div key={s.id} className="flex justify-between items-center group">
                                                        <span className={`text-xs font-bold transition-opacity ${hasSkill ? 'text-white' : 'text-white/20'}`}>{s.name}</span>
                                                        <button 
                                                            onClick={async () => {
                                                                const newSkills = hasSkill ? barber.skills.filter(id => id !== s.id) : [...barber.skills, s.id];
                                                                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('barbers').doc(barber.id).update({skills: newSkills});
                                                            }}
                                                            className={`w-10 h-5 rounded-full relative transition-colors ${hasSkill ? 'bg-[#d4af37]' : 'bg-white/10'}`}
                                                        >
                                                            <div className={`absolute top-1 w-3 h-3 bg-white rounded-full transition-all ${hasSkill ? 'right-1' : 'left-1'}`}></div>
                                                        </button>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Navigazione Inferiore */}
                    <div className="fixed bottom-0 left-0 right-0 philia-bg border-t border-[#d4af37]/10 p-5 flex justify-around items-center max-w-md mx-auto z-50 rounded-t-3xl shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
                        <button onClick={()=>{setView('booking'); setStep(1);}} className={`flex flex-col items-center transition-all ${view === 'booking' ? 'philia-gold scale-110' : 'text-white/30'}`}>
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            <span className="text-[9px] font-black mt-1 uppercase tracking-widest">Prenota</span>
                        </button>
                        <button onClick={()=>setView('my-bookings')} className={`flex flex-col items-center transition-all ${view === 'my-bookings' ? 'philia-gold scale-110' : 'text-white/30'}`}>
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                            <span className="text-[9px] font-black mt-1 uppercase tracking-widest">Miei Tagli</span>
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
