<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prenota Philia</title>
    <style>
        body { background-color: #332d2d; color: #d4af37; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .logo { max-width: 150px; margin-bottom: 20px; }
        #my-cal { width: 100%; height: 800px; border: none; }
    </style>
</head>
<body>
    <img src="logo.png" alt="Philia Logo" class="logo">
    
    <div id="my-cal"></div>

    <script>
      (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; let d = C.document; C.Cal = C.Cal || function () { let a = C.Cal; if (!a.q) { a.q = []; } p(a, arguments); }; }(window, "https://app.cal.com/embed/embed.js", "Cal"));
      
      Cal("init", {origin: "https://app.cal.com"});

      Cal("inline", {
        elementOrSelector: "#my-cal",
        calLink: "IL_TUO_LINK_DI_CAL_COM", // Inserisci qui la parte finale del tuo link (es: simone/taglio)
        config: {"theme":"dark"}
      });

      // Il trucco per il redirect gratuito
      Cal("on", {
        action: "bookingSuccessful",
        callback: (e) => {
          // Quando la prenotazione è confermata, manda alla pagina ponte
          // Passiamo anche i parametri per l'app
          setTimeout(() => {
            window.location.href = "index.html" + window.location.search;
          }, 1500);
        }
      });
    </script>
</body>
</html>
